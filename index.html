<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#08A89A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEXFOR">
<title>NEXFOR · Plataforma Integral de Formación y Desarrollo Policial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  /* ===== TEMA CLARO (por defecto) ===== */
  --bg:#E6F7F4;            /* fondo turquesa claro vivo (el degradado va en body) */
  --surface:#FFFFFF;       /* superficie de tarjetas */
  --surface-2:#D6F1EC;     /* superficie elevada con tinte turquesa */
  --line:#9FD8CF;          /* bordes con presencia */
  --violet:#04A293;        /* turquesa intenso y saturado */
  --violet-soft:#067A6F;
  --violet-dim:rgba(4,162,147,.18);
  --amber:#FF4A1F;         /* coral muy intenso */
  --amber-dim:rgba(255,74,31,.16);
  --text:#08221F;
  --muted:#456E69;
  --ok:#0E9D63; --ok-dim:rgba(14,157,99,.15);
  --warn:#D08305; --warn-dim:rgba(208,131,5,.15);
  --bad:#E03B3B; --bad-dim:rgba(224,59,59,.15);
  --info:#1E6FE0; --info-dim:rgba(30,111,224,.14);
  --cyan:#0AB5D4; --cyan-dim:rgba(10,181,212,.16);
  --tech:#1E6FE0;          /* azul tecnológico */
  --glass:rgba(255,255,255,.62);
  --glass-strong:rgba(255,255,255,.78);
  --glass-border:rgba(255,255,255,.55);
  --glass-blur:18px;
  --shadow:0 10px 34px rgba(4,90,82,.14);
  --shadow-glass:0 8px 32px rgba(4,90,82,.13), inset 0 1px 0 rgba(255,255,255,.55);
  --radius:14px;
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
}
[data-theme="dark"]{
  /* ===== TEMA OSCURO ===== */
  --bg:#08171A;            /* petróleo profundo */
  --surface:#0E2226;       /* superficie de tarjetas */
  --surface-2:#143036;     /* superficie elevada */
  --line:#1E454C;          /* bordes sutiles */
  --violet:#19D3BE;        /* turquesa intenso */
  --violet-soft:#6FF5E0;
  --violet-dim:rgba(25,211,190,.18);
  --amber:#FF6A45;         /* coral cálido intenso */
  --amber-dim:rgba(255,106,69,.18);
  --text:#EAF6F4;
  --muted:#8FB3B0;
  --ok:#34D399; --ok-dim:rgba(52,211,153,.14);
  --warn:#FBBF24; --warn-dim:rgba(251,191,36,.13);
  --bad:#F87171; --bad-dim:rgba(248,113,113,.14);
  --info:#60A5FA; --info-dim:rgba(96,165,250,.13);
  --cyan:#3DDBF2; --cyan-dim:rgba(61,219,242,.16);
  --tech:#4D96FF;
  --glass:rgba(18,42,48,.55);
  --glass-strong:rgba(20,48,54,.72);
  --glass-border:rgba(111,245,224,.14);
  --glass-blur:18px;
  --shadow:0 8px 30px rgba(0,0,0,.4);
  --shadow-glass:0 8px 32px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;min-height:100vh}
body{background-image:radial-gradient(1200px 600px at 8% -5%, rgba(4,162,147,.16), transparent 60%), radial-gradient(900px 500px at 100% 0%, rgba(255,74,31,.10), transparent 55%), radial-gradient(1000px 700px at 95% 110%, rgba(10,181,212,.12), transparent 60%), radial-gradient(800px 700px at 50% 120%, rgba(30,111,224,.08), transparent 60%);background-attachment:fixed}
[data-theme="dark"] body{background-image:radial-gradient(1200px 600px at 8% -5%, rgba(25,211,190,.12), transparent 60%), radial-gradient(900px 500px at 100% 0%, rgba(255,106,69,.07), transparent 55%), radial-gradient(1000px 700px at 95% 110%, rgba(61,219,242,.08), transparent 60%)}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text);background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;width:100%;outline:none;transition:border .15s}
select option{background:var(--surface);color:var(--text)}
input::placeholder,textarea::placeholder{color:var(--muted);opacity:.8}
input:focus,select:focus,textarea:focus{border-color:var(--violet)}
input::placeholder,textarea::placeholder{color:var(--muted);opacity:.7}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
::-webkit-scrollbar-track{background:transparent}
a{color:var(--violet-soft)}
.escudo-dcf{display:inline-block;object-fit:contain;flex:none;filter:drop-shadow(0 2px 5px rgba(0,0,0,.22))}
.pwd-wrap{position:relative;display:flex;align-items:center}
.pwd-wrap input{flex:1;padding-right:44px}
.pwd-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;font-size:18px;cursor:pointer;padding:6px;border-radius:8px;line-height:1;transition:background .15s}
.pwd-toggle:hover{background:var(--violet-dim)}
[data-theme="dark"] .escudo-dcf{filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.subtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.subtab{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:11px;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:13.5px;font-weight:600;transition:all .15s}
.subtab:hover{border-color:var(--violet);color:var(--text)}
.subtab.active{background:var(--violet);border-color:var(--violet);color:#fff;box-shadow:0 4px 14px var(--violet-dim)}
.subtab-count{font-size:11.5px;background:rgba(0,0,0,.12);padding:1px 8px;border-radius:20px}
.subtab.active .subtab-count{background:rgba(255,255,255,.25)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;border:1.5px dashed var(--line);border-radius:14px;background:var(--surface-2)}

/* ---------- Login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:24px}
#nexo-canvas{position:absolute;inset:0;width:100%;height:100%;opacity:.55}
.login-card{position:relative;z-index:2;width:100%;max-width:420px;background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:36px 32px;box-shadow:var(--shadow)}
[data-theme="dark"] .login-card{background:rgba(14,34,38,.9);backdrop-filter:blur(14px);box-shadow:0 30px 80px rgba(0,0,0,.55)}
.brand{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:6px}
.brand-name{font-family:var(--font-display);font-size:34px;font-weight:700;letter-spacing:.14em}
.brand-name .fx{color:var(--violet-soft)}
.brand-name3d{display:flex;perspective:700px}
.brand-name3d span{font-family:var(--font-display);font-size:36px;font-weight:700;letter-spacing:.1em;display:inline-block;transform-style:preserve-3d;animation:letraIn .85s cubic-bezier(.2,.7,.3,1.25) backwards, letraFloat 5.5s ease-in-out infinite;color:var(--text);text-shadow:0 0 24px rgba(20,184,166,.4)}
.brand-name3d span.fx{color:var(--violet-soft);text-shadow:0 0 24px rgba(94,234,212,.6)}
@keyframes letraIn{from{opacity:0;transform:rotateX(95deg) translateY(20px) translateZ(-50px)}to{opacity:1;transform:rotateX(0) translateY(0) translateZ(0)}}
@keyframes letraFloat{0%,100%{transform:translateY(0) rotateX(0)}50%{transform:translateY(-5px) rotateX(11deg)}}
.logo-glow svg{animation:logoPulse 3.4s ease-in-out infinite}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(25,211,190,.55))}50%{filter:drop-shadow(0 0 18px rgba(255,106,69,.6))}}
/* animaciones del logo NEXFOR */
.logo-nexo .nx-orbit{animation:nxOrbit 3.6s linear infinite}
@keyframes nxOrbit{to{transform:rotate(360deg)}}
.logo-nexo .nx-stroke{stroke-dasharray:120;stroke-dashoffset:120;animation:nxDraw 2.2s ease-in-out forwards, nxFloat 4.5s ease-in-out 2.2s infinite}
@keyframes nxDraw{to{stroke-dashoffset:0}}
@keyframes nxFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}
.logo-nexo .nx-node{animation:nxPulse 2.4s ease-in-out infinite}
.logo-nexo .nx-node.n2{animation-delay:.5s}
.logo-nexo .nx-node.n3{animation-delay:1s}
@keyframes nxPulse{0%,100%{opacity:1;r:3.2}50%{opacity:.55;r:4.4}}
@media (prefers-reduced-motion: reduce){.logo-nexo .nx-orbit,.logo-nexo .nx-stroke,.logo-nexo .nx-node{animation:none}.logo-nexo .nx-stroke{stroke-dashoffset:0}}
.scan-señal{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.brand-sub{text-align:center;color:var(--muted);font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:22px}
.lema{font-size:13px;color:var(--muted);text-align:center;border-left:none;margin:18px 0 24px;padding:14px 16px;background:var(--violet-dim);border:1px solid rgba(20,184,166,.25);border-radius:12px;font-style:italic;line-height:1.6}
.lema b{color:var(--amber);font-style:normal}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:11px;padding:11px 18px;font-weight:600;font-size:14px;transition:transform .12s,opacity .15s,box-shadow .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--violet),var(--violet-soft));color:#fff;font-weight:700;width:100%;box-shadow:0 4px 16px var(--violet-dim)}
.btn-primary:hover{opacity:.95;transform:translateY(-1px);box-shadow:0 8px 22px var(--violet-dim)}
[data-theme="dark"] .btn-primary{color:#04201D}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
.btn-ghost:hover{border-color:var(--violet)}
.btn-amber{background:var(--amber);color:#3A0F06}
.btn-danger{background:var(--bad-dim);color:var(--bad);border:1px solid rgba(248,113,113,.3)}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:9px}
.login-error{background:var(--bad-dim);color:var(--bad);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:12px;text-align:center}
.demo-hint{margin-top:18px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.7}
.dev-credit{position:relative;z-index:2;margin-top:18px;text-align:center;font-size:11.5px;color:var(--muted);letter-spacing:.05em}
.dev-credit b{color:var(--amber)}

/* ---------- Shell ---------- */
.shell{display:flex;min-height:100vh}
.sidebar{width:248px;flex-shrink:0;background:var(--glass-strong);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-right:1px solid var(--glass-border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-brand{padding:18px 14px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
.sb-brand .nm{font-family:var(--font-display);font-weight:700;font-size:17px;letter-spacing:.10em}
.sb-brand .nm .fx{color:var(--violet-soft)}
.sb-brand .tg{font-size:9.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.sb-nav{flex:1;padding:12px 10px}
.sb-section{font-size:9.5px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;padding:16px 10px 7px;display:flex;align-items:center;gap:7px;font-weight:700}
.sb-section::after{content:'';flex:1;height:1px;background:var(--line)}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:none;color:var(--muted);padding:9px 11px;border-radius:11px;font-size:13.5px;font-weight:500;margin-bottom:2px;transition:all .14s;position:relative}
.nav-item:hover{background:var(--surface-2);color:var(--text);transform:translateX(2px)}
.nav-item.active{background:linear-gradient(135deg,var(--violet),var(--violet-soft));color:#fff;box-shadow:0 4px 16px var(--violet-dim)}
.nav-item.active .ic{background:rgba(255,255,255,.2)}
.nav-item .ic{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:15px;background:var(--surface-2);transition:background .14s;flex:none}
.nav-item:hover .ic{background:var(--violet-dim)}
.sb-foot{padding:14px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted);text-align:center;line-height:1.6}
.sb-foot b{color:var(--amber)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid var(--line);background:color-mix(in srgb, var(--surface) 80%, transparent);backdrop-filter:blur(10px);position:sticky;top:0;z-index:40}
.topbar h2{font-size:18px;flex:1}
.campana-wrap{position:relative}
.campana-btn{position:relative;background:transparent;border:none;font-size:20px;cursor:pointer;padding:7px;border-radius:10px;line-height:1;transition:background .15s}
.campana-btn:hover{background:var(--violet-dim)}
.campana-badge{position:absolute;top:0;right:0;background:var(--amber);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--surface);animation:campPop .3s ease}
@keyframes campPop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
.campana-panel{position:absolute;right:0;top:46px;width:340px;max-width:90vw;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 16px 50px rgba(0,0,0,.22);z-index:60;overflow:hidden;animation:campSlide .18s ease}
@keyframes campSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.campana-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px}
.campana-list{max-height:380px;overflow-y:auto}
.campana-empty{padding:28px 16px;text-align:center;color:var(--muted);font-size:13px}
.campana-item{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;background:transparent;border:none;border-bottom:1px solid var(--line);padding:12px 14px;cursor:pointer;transition:background .12s;position:relative}
.campana-item:hover{background:var(--surface-2)}
.campana-item.unread{background:var(--violet-dim)}
.campana-item.unread:hover{background:color-mix(in srgb, var(--violet-dim) 70%, var(--surface-2))}
.ci-ic{font-size:18px;flex:none;margin-top:1px}
.ci-body{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.ci-tit{font-size:13.5px;font-weight:600;color:var(--text)}
.ci-det{font-size:12px;color:var(--muted);white-space:normal;overflow-wrap:anywhere}
.ci-time{font-size:11px;color:var(--muted);margin-top:2px}
.ci-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);flex:none;margin-top:6px}
.userchip{display:flex;align-items:center;gap:10px;background:var(--glass);border:1px solid var(--glass-border);border-radius:999px;padding:5px 14px 5px 5px;backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur))}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:var(--font-display)}
.av-admin{background:var(--amber);color:#3A0F06}
.av-docente{background:var(--violet);color:#04201D}
.av-aspirante{background:var(--surface-2);color:var(--violet-soft);border:1px solid var(--violet)}
.userchip .un{font-size:13px;font-weight:600;line-height:1.2}
.userchip .ur{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.content{flex:1;padding:22px;max-width:1180px;width:100%;margin:0 auto}
.hamb{display:none;background:transparent;border:1px solid var(--line);border-radius:9px;color:var(--text);padding:7px 11px;font-size:16px}
.theme-toggle{position:absolute;top:18px;right:18px;z-index:5;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:transform .15s}
.theme-toggle:active{transform:scale(.92)}
.theme-btn{width:38px;height:38px;flex-shrink:0;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;transition:transform .12s}
.theme-btn:active{transform:scale(.92)}

/* ---------- Componentes ---------- */
.card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur))}
.glass{background:var(--glass);border:1px solid var(--glass-border);box-shadow:var(--shadow-glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur))}
.grid{display:grid;gap:14px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
.stat{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow-glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur))}
.stat::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--violet)}
.stat.amber::after{background:var(--amber)}
.stat.ok::after{background:var(--ok)}
.stat.bad::after{background:var(--bad)}
.stat.cyan::after{background:var(--cyan)}
.stat.tech::after{background:var(--tech)}
.stat .k{font-family:var(--font-display);font-size:28px;font-weight:700}
.stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

/* ===== CENTRO DE COMANDO ===== */
.cmd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1000px){.cmd-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.cmd-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{position:relative;border-radius:16px;padding:16px 18px;overflow:hidden;color:var(--text);background:var(--glass);border:1px solid var(--glass-border);box-shadow:var(--shadow-glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));transition:transform .18s ease, box-shadow .18s ease;cursor:default}
.kpi:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(4,90,82,.2)}
[data-theme="dark"] .kpi:hover{box-shadow:0 16px 44px rgba(0,0,0,.5)}
.kpi .kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kpi .kpi-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--violet-dim);color:var(--violet)}
.kpi .kpi-val{font-family:var(--font-display);font-size:30px;font-weight:700;line-height:1}
.kpi .kpi-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:5px}
.kpi .kpi-sub{font-size:11.5px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:5px}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(var(--violet),var(--cyan))}
.kpi.amber::before{background:linear-gradient(var(--amber),#FF8A6B)} .kpi.amber .kpi-ic{background:var(--amber-dim);color:var(--amber)}
.kpi.cyan::before{background:linear-gradient(var(--cyan),var(--tech))} .kpi.cyan .kpi-ic{background:var(--cyan-dim);color:var(--cyan)}
.kpi.tech::before{background:linear-gradient(var(--tech),var(--cyan))} .kpi.tech .kpi-ic{background:var(--info-dim);color:var(--tech)}
.kpi.ok::before{background:linear-gradient(var(--ok),#34D399)} .kpi.ok .kpi-ic{background:var(--ok-dim);color:var(--ok)}

const ROLES = {admin:'Administración', docente:'Docente', aspirante:'Aspirante'};
const ESTADOS_ASIST = {P:'Presente', A:'Ausente', T:'Tarde', J:'Justificado'};

/* ---------- helpers de datos ---------- */
const nombreCompleto = (u) => u ? `${u.apellido}, ${u.nombre}` : '—';
/* crea una notificación dirigida a roles/usuarios. destinoRoles: array de roles ('admin','docente','aspirante'); excluye al autor */
const pushNotif = (setDb, {titulo, detalle, icono='🔔', destinoRoles=['admin','docente','aspirante'], autorId=null, vista='inicio'}) => {
  setDb(d=>({...d, notificaciones:[{id:uid(), titulo, detalle:detalle||'', icono, destinoRoles, autorId, vista, fecha:new Date().toISOString(), leidaPor:[]}, ...(d.notificaciones||[])].slice(0,200)}));
};
/* materias que dicta un docente (en cualquier sección) */
const materiasDeDocente = (db,uid) => db.materias.filter(m=>(m.asignaciones||[]).some(a=>a.docenteId===uid));
/* secciones donde un docente dicta una materia dada */
const seccionesDeDocenteEnMateria = (m,uid) => (m.asignaciones||[]).filter(a=>a.docenteId===uid).map(a=>a.seccion);
/* todas las materias del plan (todas las secciones cursan las mismas) */
const materiasDeSeccion = (db) => db.materias;
/* aspirantes de una sección */
const aspirantesDeSeccion = (db,seccion) => db.usuarios.filter(u=>u.rol==='aspirante' && u.seccion===seccion && u.activo);
/* docente asignado a una materia en una sección concreta */
const docenteDeMateriaSeccion = (db,m,seccion) => {
  const a = (m.asignaciones||[]).find(x=>x.seccion===seccion);
  return a ? db.usuarios.find(u=>u.id===a.docenteId) : null;
};

function pctAsistencia(db, aspId, materiaId){
  const regs = db.asistencias.filter(a=>a.aspiranteId===aspId && (!materiaId || a.materiaId===materiaId));
  if(!regs.length) return null;
  const pres = regs.filter(a=>a.estado==='P'||a.estado==='T'||a.estado==='J').length;
  return Math.round(pres/regs.length*100);
}

/* conducta: puntaje 0-10 que baja según gravedad de amonestaciones */
const PESO_AMON = {leve:0.5, media:1.5, grave:3};
function conductaAsp(db, aspId){
  const ams=(db.amonestaciones||[]).filter(a=>a.aspiranteId===aspId);
  let p=10; ams.forEach(a=>{ p-=(PESO_AMON[a.gravedad]||1); });
  return {puntaje:Math.max(0,Math.round(p*10)/10), cantidad:ams.length, lista:ams};
}

/* sello de tiempo + código de verificación para firma biométrica */
function generarSello(payload){
  const ts=new Date().toISOString();
  let h=0; const base=payload+'|'+ts;
  for(let i=0;i<base.length;i++){ h=((h<<5)-h+base.charCodeAt(i))|0; }
  const cod='NX-'+Math.abs(h).toString(36).toUpperCase().padStart(7,'0').slice(0,7);
  return {ts, cod};
}
const fmtSello=(ts)=> ts? new Date(ts).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';

/* ---------- Canvas "nexo" del login ---------- */
function NexoCanvas(){
  const ref = useRef(null);
  useEffect(()=>{
    const cv = ref.current; if(!cv) return;
    const ctx = cv.getContext('2d');
    let W,H,raf; const N=46; const nodes=[];
    const resize=()=>{W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight;};
    resize(); window.addEventListener('resize',resize);
    for(let i=0;i<N;i++) nodes.push({x:Math.random()*1600,y:Math.random()*1000,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*2+1,amber:Math.random()<.18});
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const draw=()=>{
      ctx.clearRect(0,0,W,H);
      nodes.forEach(n=>{ n.x+=n.vx; n.y+=n.vy; if(n.x<0||n.x>W)n.vx*=-1; if(n.y<0||n.y>H)n.vy*=-1; });
      for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
        const a=nodes[i],b=nodes[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<150){ ctx.strokeStyle=`rgba(25,211,190,${(1-d/150)*.34})`; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
      }
      nodes.forEach(n=>{ ctx.fillStyle=n.amber?'#FF6A45':'#6FF5E0'; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,7); ctx.fill(); });
      if(!reduced) raf=requestAnimationFrame(draw);
    };
    draw();

function EscudoDCF({size=44}){
  return <img className="escudo-dcf" src={ESCUDO_DCF} alt="Escudo DCFyCCCO" style={{height:size,width:'auto'}}/>;
}

function LogoNexo({size=44}){
  /* Logo NEXFOR: "N" de nexo en circuito, animado (sin forma de escudo) */
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" aria-hidden="true" className="logo-nexo">
      <defs>
        <linearGradient id="nx-g" x1="0" y1="1" x2="1" y2="0">
          <stop offset="0%" stopColor="var(--amber)"/>
          <stop offset="55%" stopColor="var(--violet-soft)"/>
          <stop offset="100%" stopColor="var(--violet)"/>
        </linearGradient>
        <filter id="nx-glow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="1.6" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      {/* anillo orbital giratorio */}
      <circle cx="32" cy="32" r="27" fill="none" stroke="var(--violet-dim)" strokeWidth="1.4"/>
      <circle className="nx-orbit" cx="32" cy="32" r="27" fill="none" stroke="url(#nx-g)" strokeWidth="2.4"
              strokeLinecap="round" strokeDasharray="34 136" style={{transformOrigin:'32px 32px'}}/>
      {/* trazo de la N con dibujo animado */}
      <path className="nx-stroke" d="M22 46 V18 L42 46 V18" fill="none" stroke="url(#nx-g)"
            strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" filter="url(#nx-glow)"/>
      {/* nodos pulsantes en los vértices */}
      <circle className="nx-node n1" cx="22" cy="18" r="3.2" fill="var(--amber)"/>
      <circle className="nx-node n2" cx="42" cy="46" r="3.2" fill="var(--amber)"/>
      <circle className="nx-node n3" cx="32" cy="32" r="2.4" fill="#FFFFFF"/>
    </svg>
  );
}

/* ---------- Login ---------- */
function Login({onLogin, installEvt, onInstall, tema, toggleTema}){
  const [usuario,setUsuario]=useState('');
  const [clave,setClave]=useState('');
  const [verClave,setVerClave]=useState(false);
  const [err,setErr]=useState('');
  const submit=()=>{
    const u = SEED_DB_REF.current.usuarios.find(x=>x.usuario.toLowerCase()===usuario.trim().toLowerCase() && x.clave===clave);
    if(!u){ setErr('Usuario o contraseña incorrectos.'); return; }
    if(!u.activo){ setErr('Tu usuario está inactivo. Consultá con la Secretaría Académica.'); return; }
    onLogin(u);
  };
  return (
    <div className="login-wrap">
      <NexoCanvas/>
      <button className="theme-toggle" onClick={toggleTema} title="Cambiar tema" aria-label="Cambiar tema claro/oscuro">{tema==='light'?'🌙':'☀️'}</button>
      <div style={{position:'relative',zIndex:2,width:'100%',maxWidth:420}}>
        <div className="login-card">
          <div className="brand">
            <span className="logo-glow"><LogoNexo size={50}/></span>
            <div className="brand-name3d" aria-label="NEXFOR">
              {'NEXFOR'.split('').map((l,i)=>(
                <span key={i} className={i>=3?'fx':''} style={{animationDelay:(0.09*i)+'s, '+(0.35*i+0.9)+'s'}}>{l}</span>
              ))}
            </div>
            <EscudoDCF size={50}/>
          </div>
          <div className="brand-sub">Plataforma Integral de Formación y Desarrollo Policial</div>
          <div className="significado-login"><b>NEXFOR</b> nace de <b>nexo</b> y <b>formación</b>: el punto de encuentro entre la enseñanza tradicional de la Escuela y las herramientas del futuro. Un nexo entre el aspirante, el docente y el conocimiento, que forma agentes preparados para servir.</div>

function Pizarra({db,setDb,user,toast}){
  const esAdmin=user.rol==='admin';
  const canvasRef=useRef(null);
  const [color,setColor]=useState('#19D3BE');
  const [grosor,setGrosor]=useState(3);
  const [dibujando,setDibujando]=useState(false);
  const piz=db.pizarra||{dibujo:null,notas:[]};
  const COLORES=['#19D3BE','#FF6A45','#3DDBF2','#FACC15','#A78BFA','#FFFFFF','#1A1430'];

  // cargar dibujo guardado al montar / cuando cambia
  useEffect(()=>{
    const cv=canvasRef.current; if(!cv) return;
    const ctx=cv.getContext('2d');
    ctx.clearRect(0,0,cv.width,cv.height);
    if(piz.dibujo){ const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0,cv.width,cv.height); img.src=piz.dibujo; }
  },[piz.dibujo]);

  const pos=(e)=>{
    const cv=canvasRef.current, r=cv.getBoundingClientRect();
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
    const cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
    return {x:cx*(cv.width/r.width), y:cy*(cv.height/r.height)};
  };
  const start=(e)=>{ if(!esAdmin)return; e.preventDefault(); setDibujando(true); const ctx=canvasRef.current.getContext('2d'); const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
  const move=(e)=>{ if(!esAdmin||!dibujando)return; e.preventDefault(); const ctx=canvasRef.current.getContext('2d'); const p=pos(e); ctx.lineTo(p.x,p.y); ctx.strokeStyle=color; ctx.lineWidth=grosor; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke(); };
  const end=()=>{ if(!esAdmin||!dibujando)return; setDibujando(false); guardarDibujo(); };
  const guardarDibujo=()=>{ const data=canvasRef.current.toDataURL('image/png'); setDb(d=>({...d, pizarra:{...(d.pizarra||{notas:[]}), dibujo:data}})); };
  const limpiar=()=>{ if(!confirm('¿Borrar todo el dibujo de la pizarra?'))return; const cv=canvasRef.current; cv.getContext('2d').clearRect(0,0,cv.width,cv.height); setDb(d=>({...d, pizarra:{...(d.pizarra||{notas:[]}), dibujo:null}})); };

  const addNota=()=>{
    const txt=prompt('Texto de la nota:'); if(!txt||!txt.trim())return;
    const colores=['#FACC15','#FF6A45','#3DDBF2','#A78BFA','#34D399'];
    const nota={id:uid(), txt:txt.trim(), color:colores[Math.floor(Math.random()*colores.length)], x:8+Math.random()*60, y:8+Math.random()*40, autorId:user.id};
    setDb(d=>({...d, pizarra:{...(d.pizarra||{dibujo:null}), notas:[...((d.pizarra||{}).notas||[]), nota]}}));
  };
  const quitarNota=(id)=>{ setDb(d=>({...d, pizarra:{...(d.pizarra||{}), notas:((d.pizarra||{}).notas||[]).filter(n=>n.id!==id)}})); };

  return (
    <div className="card piz-card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}}>
        <h4>🖍️ Pizarra institucional</h4>
        {esAdmin ? (
          <div className="piz-tools">
            {COLORES.map(c=><button key={c} className={"piz-col "+(color===c?'sel':'')} style={{background:c}} onClick={()=>setColor(c)} title="Color"/>)}
            <select value={grosor} onChange={e=>setGrosor(+e.target.value)} style={{width:'auto'}}>
              <option value="2">Fino</option><option value="3">Medio</option><option value="6">Grueso</option><option value="12">Marcador</option>
            </select>
            <button className="btn btn-ghost btn-sm" onClick={addNota}>📌 Nota</button>
            <button className="btn btn-danger btn-sm" onClick={limpiar}>🧹 Limpiar</button>
          </div>
        ) : <span className="badge bg-info" style={{fontSize:11}}>Solo lectura</span>}
      </div>
      <div className="piz-board">
        <canvas ref={canvasRef} width={1000} height={420} className="piz-canvas"
          style={{cursor:esAdmin?'crosshair':'default'}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
        {(piz.notas||[]).map(n=>(
          <div key={n.id} className="piz-nota" style={{background:n.color, left:n.x+'%', top:n.y+'%'}}>
            {n.txt}
            {esAdmin && <button className="piz-nota-x" onClick={()=>quitarNota(n.id)}>✕</button>}
          </div>
        ))}
        {!esAdmin && (piz.notas||[]).length===0 && !piz.dibujo && <div className="piz-empty">La pizarra está vacía por ahora.</div>}
      </div>
    </div>
  );
}

  // ===== panel de actividad reciente (mezcla de fuentes) =====
  const actividad = [];
  db.comunicados.forEach(c=>actividad.push({ic:'📢',t:'Comunicado: '+c.titulo,d:nombreCompleto(db.usuarios.find(u=>u.id===c.autorId)),f:c.fecha}));

  (db.tramites||[]).forEach(t=>actividad.push({ic:'📥',t:'Mesa de Entradas · '+t.numero,d:t.asunto,f:t.fecha}));
  const actReciente = actividad.sort((a,b)=>(b.f||'').localeCompare(a.f||'')).slice(0,6);

  // ===== sistema predictivo: alertas =====
  const alertas = [];

    // cursos/secciones con asistencia baja

    });
    // aspirantes con bajo rendimiento
    const bajos = db.usuarios.filter(u=>u.rol==='aspirante'&&u.activo).filter(a=>{
      const cs=db.calificaciones.filter(c=>c.aspiranteId===a.id); if(!cs.length) return false;
      const notas=cs.flatMap(c=>['parcial1','parcial2','tp','final'].map(k=>c[k]).filter(n=>n!=null)); if(!notas.length) return false;
      return notas.reduce((x,y)=>x+y,0)/notas.length < 4;
    }).length;
    if(bajos>0) alertas.push({tipo:'warn',ic:'⚠️',txt:`${bajos} aspirante(s) con bajo rendimiento académico`});
    // docentes sin carga en libro de temas
    const sinCarga = db.usuarios.filter(u=>u.rol==='docente'&&u.activo).filter(d=>!db.libroTemas.some(t=>t.docenteId===d.id)).length;

    if(tramPend>0) alertas.push({tipo:'warn',ic:'📥',txt:`${tramPend} presentación(es) sin procesar en Mesa de Entradas`});
  }

  const tiempoRel=(f)=>{ if(!f) return ''; const d=(new Date(hoy())-new Date(f))/86400000; if(d<=0)return 'hoy'; if(d<2)return 'ayer'; if(d<30)return Math.round(d)+' días'; return fmtFecha(f); };

  return (
    <div>
      {/* HERO */}

          <div className="lema" style={{margin:'10px 0 0',maxWidth:760}}>“{LEMA_1}”</div>
        </div>
      </div>

      {/* ALERTAS INTELIGENTES */}
      {alertas.length>0 && (
        <div style={{marginBottom:16}}>
          <div className="cmd-section-title">⚡ Alertas inteligentes</div>

        </div>

      {/* KPIs - CENTRO DE COMANDO */}
      <div className="cmd-section-title">📊 Indicadores principales</div>
      <div className="cmd-grid" style={{marginBottom:8}}>
        {esAdmin && <>

          <Kpi ic="📈" val={asisGen===null?'—':asisGen+'%'} lbl="Asistencia general" tone={asisGen===null?'tech':asisGen>=80?'ok':'bad'} onClick={()=>go('asistencia')}/>
          <Kpi ic="📚" val={db.materias.length} lbl="Materias del plan" tone="tech" onClick={()=>go('materias')}/>
          <Kpi ic="📢" val={db.comunicados.length} lbl="Comunicados" tone="" onClick={()=>go('comunicados')}/>
          <Kpi ic="📥" val={tramPend} lbl="Trámites pendientes" tone={tramPend>0?'amber':'ok'} onClick={()=>go('mesa')}/>
          <Kpi ic="📨" val={pendNexia} lbl="Consultas NEXIA" tone={pendNexia>0?'bad':'cyan'} onClick={()=>go('nexia')}/>
        </>}
        {user.rol==='docente' && <>
          <Kpi ic="📚" val={misMaterias.length} lbl="Mis materias" tone="" onClick={()=>go('materias')}/>
          <Kpi ic="📖" val={db.libroTemas.filter(t=>t.docenteId===user.id).length} lbl="Clases registradas" tone="cyan" onClick={()=>go('libro')}/>
          <Kpi ic="✅" val={db.asistencias.filter(a=>a.docenteId===user.id&&a.fecha===hoy()).length>0?'Sí':'No'} lbl="Asistencia de hoy" tone="amber" onClick={()=>go('asistencia')}/>
          <Kpi ic="📢" val={db.comunicados.length} lbl="Comunicados" tone="tech" onClick={()=>go('comunicados')}/>
        </>}
        {user.rol==='aspirante' && <>

          <Kpi ic="📈" val={miPct===null?'—':miPct+'%'} lbl="Mi asistencia" tone={miPct===null?'tech':miPct>=80?'ok':'bad'} onClick={()=>go('asistencia')}/>
          <Kpi ic="📊" val={db.calificaciones.filter(c=>c.aspiranteId===user.id).length} lbl="Notas cargadas" tone="cyan" onClick={()=>go('notas')}/>

function Kpi({ic,val,lbl,sub,tone='',onClick}){
  return (
    <div className={"kpi "+tone} onClick={onClick} style={{cursor:onClick?'pointer':'default'}}>
      <div className="kpi-top"><div className="kpi-ic">{ic}</div></div>
      <div className="kpi-val">{val}</div>
      <div className="kpi-lbl">{lbl}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}

function LibroTemas({db,setDb,user,toast}){
  const editable = user.rol!=='aspirante';
  const misMaterias = user.rol==='docente' ? materiasDeDocente(db,user.id) : db.materias;

  const materia = db.materias.find(m=>m.id===materiaId);
  const seccionesDisp = !materia ? [] : (user.rol==='docente' ? seccionesDeDocenteEnMateria(materia,user.id) : SECCIONES);
  const [seccion,setSeccion]=useState(seccionesDisp[0]||'');
  const [modal,setModal]=useState(false);

  const entradas = db.libroTemas.filter(t=>t.materiaId===materiaId && t.seccion===seccion).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  // docente que dicta esta materia en esta sección (para encabezado)
  const docHeader = (materia && seccion) ? docenteDeMateriaSeccion(db, materia, seccion) : null;
  const guardar=()=>{
    if(!form.tema.trim()){toast('Ingresá el tema de la clase');return;}
    const docente = db.usuarios.find(u=>u.id===user.id);

    const claseN = entradas.length+1;
    const sello = generarSello(user.id+'|'+materiaId+'|'+seccion+'|'+form.fecha+'|'+form.tema);
    setDb(d=>({...d, libroTemas:[...d.libroTemas, {id:uid(), materiaId, seccion, docenteId:user.id, claseN, firmado:true, firmaImg:docente?.firma||null, selloTs:sello.ts, selloCod:sello.cod, fecha:form.fecha, tema:form.tema, obs:form.obs}]}));
    pushNotif(setDb,{titulo:'Clase registrada en Libro de Temas', detalle:(materia?.nombre||'')+' · '+seccion+' · Clase N° '+claseN, icono:'📖', destinoRoles:['admin'], autorId:user.id, vista:'libro'});
    setModal(false); setForm({fecha:hoy(),tema:'',obs:''});
    toast('Clase firmada y sellada digitalmente ✓');
  };
  const eliminar=(id)=>{ if(confirm('¿Eliminar esta clase del libro de temas?')) setDb(d=>({...d,libroTemas:d.libroTemas.filter(t=>t.id!==id)})); };
  const jerarquiaDoc = (d)=> d ? ((d.jerarquia?d.jerarquia.toUpperCase()+' ':'')+d.apellido.toUpperCase()+' '+(d.nombre||'').toUpperCase()).trim() : '';
  return (

          {materiaId && seccion && entradas.length>0 && <ExportBtns titulo={'Libro de Temas · '+(materia?.nombre||'')+' · '+seccion} toast={toast}
            headers={['Fecha','Clase N°','Tema','Observaciones','Firma docente']}
            rows={entradas.map(t=>[fmtFecha(t.fecha), t.claseN||'—', t.tema, t.obs||'—', nombreCompleto(db.usuarios.find(u=>u.id===t.docenteId))+(t.firmado?' (firmado)':'')])}/>}
          {editable && materiaId && seccion && <button className="btn btn-primary" onClick={()=>setModal(true)}>＋ Registrar clase</button>}
        </div>
      </div>
      <div className="toolbar">
        <select value={materiaId} onChange={e=>{const id=e.target.value;setMateriaId(id);const m=db.materias.find(x=>x.id===id);const sd=!m?[]:(user.rol==='docente'?seccionesDeDocenteEnMateria(m,user.id):SECCIONES);setSeccion(sd[0]||'');}}>
          <option value="">Elegí una materia…</option>
          {misMaterias.map(m=><option key={m.id} value={m.id}>{m.nombre}</option>)}

/* ---------- Asistencia ---------- */
function Asistencia({db,setDb,user,toast}){
  if(user.rol==='aspirante') return <AsistenciaAspirante db={db} user={user}/>;
  const misMaterias = user.rol==='docente' ? materiasDeDocente(db,user.id) : db.materias;
  const [materiaId,setMateriaId]=useState(misMaterias[0]?.id||'');
  const materia = db.materias.find(m=>m.id===materiaId);
  const seccionesDisp = !materia ? [] : (user.rol==='docente' ? seccionesDeDocenteEnMateria(materia,user.id) : SECCIONES);
  const [seccion,setSeccion]=useState(seccionesDisp[0]||'');
  const [fecha,setFecha]=useState(hoy());
  const lista = (materia && seccion) ? aspirantesDeSeccion(db, seccion) : [];
  const getEstado=(aspId)=> db.asistencias.find(a=>a.materiaId===materiaId&&a.seccion===seccion&&a.fecha===fecha&&a.aspiranteId===aspId)?.estado||null;
  const marcar=(aspId,estado)=>{
    setDb(d=>{
      const otras = d.asistencias.filter(a=>!(a.materiaId===materiaId&&a.seccion===seccion&&a.fecha===fecha&&a.aspiranteId===aspId));
      return {...d, asistencias:[...otras, {id:uid(), materiaId, seccion, fecha, aspiranteId:aspId, estado, docenteId:user.id}]};
    });
  };
  const marcarTodos=(estado)=>{ lista.forEach(a=>marcar(a.id,estado)); toast(`Todos marcados como ${ESTADOS_ASIST[estado]}`); };
  const tomados = lista.filter(a=>getEstado(a.id)).length;
  return (
    <div>
      <div className="page-head">
        <div><h3>🗓️ Toma de Asistencia</h3><p>P = Presente · A = Ausente · T = Tarde · J = Justificado</p></div>
      </div>
      <div className="toolbar">
        <select value={materiaId} onChange={e=>{const id=e.target.value;setMateriaId(id);const m=db.materias.find(x=>x.id===id);const sd=!m?[]:(user.rol==='docente'?seccionesDeDocenteEnMateria(m,user.id):SECCIONES);setSeccion(sd[0]||'');}}>
          <option value="">Elegí una materia…</option>
          {misMaterias.map(m=><option key={m.id} value={m.id}>{m.nombre}</option>)}
        </select>
        <select value={seccion} onChange={e=>setSeccion(e.target.value)} disabled={!materiaId}>
          <option value="">Sección…</option>
          {seccionesDisp.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
        {materiaId && seccion && <button className="btn btn-ghost btn-sm" onClick={()=>marcarTodos('P')}>Marcar todos Presente</button>}
        {materiaId && seccion && <ExportBtns titulo={'Asistencia · '+(materia?.nombre||'')+' · '+seccion} toast={toast}
          headers={['Fecha','Aspirante','DNI','Estado']}
          rows={db.asistencias.filter(a=>a.materiaId===materiaId&&a.seccion===seccion).sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(a=>{
            const u=db.usuarios.find(x=>x.id===a.aspiranteId);
            return [fmtFecha(a.fecha), nombreCompleto(u), u?.dni||'—', ESTADOS_ASIST[a.estado]];
          })}/>}
      </div>
      {(!materiaId||!seccion) && <div className="empty card"><div className="ic">🗓️</div>Seleccioná materia, sección y fecha para tomar asistencia.</div>}
      {materiaId && seccion && (
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
            <b>{seccion} · {lista.length} aspirantes</b>
            <span className="badge bg-violet">{tomados}/{lista.length} registrados</span>
          </div>
          {lista.length===0
            ? <div style={{color:'var(--muted)',fontSize:13.5}}>No hay aspirantes cargados en {seccion}.</div>
            : <div className="table-wrap"><table>
            <thead><tr><th>Aspirante</th><th>DNI</th><th>Estado</th></tr></thead>
            <tbody>
              {lista.map(a=>{
                const est=getEstado(a.id);
                return (<tr key={a.id}>
                  <td style={{fontWeight:600}}>{nombreCompleto(a)}</td>
                  <td style={{color:'var(--muted)'}}>{a.dni}</td>
                  <td><div style={{display:'flex',gap:6}}>
                    {['P','A','T','J'].map(e=>(
                      <button key={e} title={ESTADOS_ASIST[e]} className={"att-btn "+(est===e?'sel-'+e:'')} onClick={()=>marcar(a.id,e)}>{e}</button>
                    ))}
                  </div></td>
                </tr>);
              })}
            </tbody>
          </table></div>}
        </div>
      )}
    </div>
  );
}

/* ---------- Calificaciones ---------- */
function Calificaciones({db,setDb,user,toast}){
  if(user.rol==='aspirante') return <NotasAspirante db={db} user={user}/>;
  const misMaterias = user.rol==='docente' ? materiasDeDocente(db,user.id) : db.materias;
  const [materiaId,setMateriaId]=useState(misMaterias[0]?.id||'');
  const materia = db.materias.find(m=>m.id===materiaId);
  const seccionesDisp = !materia ? [] : (user.rol==='docente' ? seccionesDeDocenteEnMateria(materia,user.id) : SECCIONES);
  const [seccion,setSeccion]=useState(seccionesDisp[0]||'');
  const lista = (materia && seccion) ? aspirantesDeSeccion(db,seccion) : [];
  const COLS = ['parcial1','parcial2','tp','final'];
  const LBL = {parcial1:'1° Parcial', parcial2:'2° Parcial', tp:'Trab. Práctico', final:'Final'};
  const getCal=(aspId)=> db.calificaciones.find(c=>c.materiaId===materiaId&&c.aspiranteId===aspId)||{};
  const setNota=(aspId,campo,val)=>{
    const v = val===''?null:Math.max(1,Math.min(10,Number(val)));
    setDb(d=>{
      const ex = d.calificaciones.find(c=>c.materiaId===materiaId&&c.aspiranteId===aspId);
      if(ex) return {...d, calificaciones:d.calificaciones.map(c=>c===ex?{...c,[campo]:v}:c)};
      return {...d, calificaciones:[...d.calificaciones,{id:uid(),materiaId,aspiranteId:aspId,[campo]:v}]};
    });
  };
  const prom=(c)=>{ const ns=COLS.map(k=>c[k]).filter(n=>n!=null); return ns.length?(ns.reduce((a,b)=>a+b,0)/ns.length).toFixed(1):null; };
  return (
    <div>
      <div className="page-head"><div><h3>📊 Calificaciones</h3><p>Escala 1 a 10. El promedio se calcula automáticamente.</p></div></div>
      <div className="toolbar">
        <select value={materiaId} onChange={e=>{const id=e.target.value;setMateriaId(id);const m=db.materias.find(x=>x.id===id);const sd=!m?[]:(user.rol==='docente'?seccionesDeDocenteEnMateria(m,user.id):SECCIONES);setSeccion(sd[0]||'');}}>
          <option value="">Elegí una materia…</option>
          {misMaterias.map(m=><option key={m.id} value={m.id}>{m.nombre}</option>)}
        </select>
        <select value={seccion} onChange={e=>setSeccion(e.target.value)} disabled={!materiaId}>
          <option value="">Sección…</option>
          {seccionesDisp.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        {materiaId && seccion && <ExportBtns titulo={'Calificaciones · '+(materia?.nombre||'')+' · '+seccion} toast={toast}
          headers={['Aspirante','DNI','1° Parcial','2° Parcial','TP','Final','Promedio']}
          rows={lista.map(a=>{ const c=getCal(a.id); const p=prom(c);
            return [nombreCompleto(a), a.dni, c.parcial1??'—', c.parcial2??'—', c.tp??'—', c.final??'—', p??'—']; })}/>}
      </div>
      {(!materiaId||!seccion) ? <div className="empty card"><div className="ic">📊</div>Seleccioná materia y sección para cargar notas.</div> :
      lista.length===0 ? <div className="empty card"><div className="ic">📊</div>No hay aspirantes en {seccion}.</div> :
      <div className="table-wrap"><table>
        <thead><tr><th>Aspirante</th>{COLS.map(c=><th key={c}>{LBL[c]}</th>)}<th>Promedio</th></tr></thead>
        <tbody>{lista.map(a=>{
          const c=getCal(a.id), p=prom(c);
          return (<tr key={a.id}>
            <td style={{fontWeight:600}}>{nombreCompleto(a)}</td>
            {COLS.map(k=>(<td key={k}><input className="note-input" type="number" min="1" max="10" value={c[k]??''} onChange={e=>setNota(a.id,k,e.target.value)}/></td>))}
            <td>{p?<span className={"badge "+(p>=7?'bg-ok':p>=4?'bg-warn':'bg-bad')}>{p}</span>:<span style={{color:'var(--muted)'}}>—</span>}</td>
          </tr>);
        })}</tbody>
      </table></div>}
    </div>
  );
}

}

/* ---------- Materias (admin) ---------- */
function Materias({db,setDb,user,toast}){
  const [modal,setModal]=useState(null);
  const docentes = db.usuarios.filter(u=>u.rol==='docente'&&u.activo).sort((a,b)=>a.apellido.localeCompare(b.apellido));
  const guardar=(m)=>{
    if(!m.nombre.trim()){toast('Ingresá el nombre de la materia');return;}
    setDb(d=> m.id
      ? {...d, materias:d.materias.map(x=>x.id===m.id?m:x)}
      : {...d, materias:[...d.materias,{...m,id:uid()}]});
    setModal(null); toast('Materia guardada ✓');
  };
  const eliminar=(id)=>{ if(confirm('¿Eliminar materia? Se conservarán los registros históricos.')) setDb(d=>({...d,materias:d.materias.filter(m=>m.id!==id)})); };
  const setAsignacion=(seccion,docenteId)=>{
    setModal(mo=>{
      const asign=(mo.asignaciones||[]).filter(a=>a.seccion!==seccion);
      if(docenteId) asign.push({seccion,docenteId});
      return {...mo,asignaciones:asign};
    });
  };
  const docDeSeccion=(m,sec)=>{ const a=(m.asignaciones||[]).find(x=>x.seccion===sec); return a? db.usuarios.find(u=>u.id===a.docenteId):null; };
  return (
    <div>
      <div className="page-head">
        <div><h3>📚 Materias</h3><p>Plan común a las 5 secciones · un docente por materia y sección.</p></div>

      </div>
      <div className="table-wrap"><table>
        <thead><tr><th>Materia</th>{SECCIONES.map(s=><th key={s} style={{whiteSpace:'nowrap'}}>{s.replace('Sección','Sec.')}</th>)}{user.rol==='admin'&&<th></th>}</tr></thead>

          <tr key={m.id}>
            <td><span style={{display:'inline-block',width:9,height:9,borderRadius:'50%',background:m.color,marginRight:8}}></span><b>{m.nombre}</b></td>
            {SECCIONES.map(s=>{ const d=docDeSeccion(m,s); return <td key={s} style={{fontSize:12.5}}>{d?<span className="mat-chip">{nombreCompleto(d)}</span>:<span style={{color:'var(--muted)'}}>—</span>}</td>; })}
            {user.rol==='admin'&&<td style={{whiteSpace:'nowrap'}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setModal({...m,asignaciones:[...(m.asignaciones||[])]})}>Editar</button>{' '}
              <button className="btn btn-danger btn-sm" onClick={()=>eliminar(m.id)}>✕</button>
            </td>}
          </tr>
        ))}</tbody>
      </table></div>
      {modal && (
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <h3>{modal.id?'Editar materia':'Nueva materia'}</h3>
            <div className="field"><label>Nombre *</label><input value={modal.nombre} onChange={e=>setModal({...modal,nombre:e.target.value})}/></div>
            <div className="field"><label>Color identificador</label><input type="color" value={modal.color} onChange={e=>setModal({...modal,color:e.target.value})} style={{height:42,padding:4}}/></div>
            <div className="field"><label>Docente asignado por sección</label>
              <div style={{display:'flex',flexDirection:'column',gap:8,border:'1px solid var(--line)',borderRadius:10,padding:10}}>
                {SECCIONES.map(s=>{
                  const a=(modal.asignaciones||[]).find(x=>x.seccion===s);
                  return (
                    <div key={s} style={{display:'flex',gap:8,alignItems:'center'}}>
                      <span style={{width:90,fontSize:13,color:'var(--muted)'}}>{s}</span>
                      <select value={a?a.docenteId:''} onChange={e=>setAsignacion(s,e.target.value)}>
                        <option value="">— Sin asignar —</option>
                        {docentes.map(d=><option key={d.id} value={d.id}>{nombreCompleto(d)}</option>)}
                      </select>
                    </div>
                  );
                })}
                {docentes.length===0 && <div style={{fontSize:12.5,color:'var(--muted)'}}>No hay docentes cargados todavía. Agregalos desde la pestaña Usuarios.</div>}
              </div>
            </div>
            <div className="modal-foot">
              <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn btn-primary" onClick={()=>guardar(modal)}>Guardar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- Usuarios (admin) ---------- */
function Usuarios({db,setDb,toast}){
  const [tab,setTab]=useState('admin');
  const [busca,setBusca]=useState('');
  const [modal,setModal]=useState(null);
  const [masiva,setMasiva]=useState(false);
  const [texto,setTexto]=useState('');
  const lista = db.usuarios
    .filter(u=>u.rol===tab)
    .filter(u=>(u.apellido+' '+u.nombre+' '+u.usuario+' '+(u.dni||'')).toLowerCase().includes(busca.toLowerCase()))
    .sort((a,b)=>a.apellido.localeCompare(b.apellido));
  const guardar=(u)=>{
    if(!u.apellido.trim()||!u.usuario.trim()){toast('Completá apellido y usuario');return;}
    if(db.usuarios.some(x=>x.usuario.toLowerCase()===u.usuario.toLowerCase()&&x.id!==u.id)){toast('Ese usuario ya existe');return;}
    setDb(d=> u.id ? {...d,usuarios:d.usuarios.map(x=>x.id===u.id?u:x)} : {...d,usuarios:[...d.usuarios,{...u,id:uid(),activo:true}]});
    setModal(null); toast('Usuario guardado ✓');
  };
  const toggleActivo=(u)=> setDb(d=>({...d,usuarios:d.usuarios.map(x=>x.id===u.id?{...x,activo:!x.activo}:x)}));
  const resetClave=(u)=>{ const nueva = u.rol==='aspirante'?'asp123':'doc123'; setDb(d=>({...d,usuarios:d.usuarios.map(x=>x.id===u.id?{...x,clave:nueva}:x)})); toast(`Clave de ${u.apellido} restablecida a "${nueva}"`); };
  const importar=()=>{
    const filas = texto.split('\n').map(l=>l.trim()).filter(Boolean);
    let ok=0; const nuevos=[];
    const slug = (s)=> (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'').toLowerCase();
    filas.forEach(l=>{
      const partes = l.split(',').map(x=>(x||'').trim());
      if(tab==='docente'){
        const [apellido,nombre,jerarquia,materia] = partes;
        if(!apellido) return;
        let u = slug(apellido)+'.'+slug(nombre); let base=u, n=1;
        while(db.usuarios.some(x=>x.usuario===u)||nuevos.some(x=>x.usuario===u)){ n++; u=base+n; }
        nuevos.push({id:uid(), apellido, nombre:nombre||'', dni:'', usuario:u, clave:'doc123', rol:'docente', jerarquia:jerarquia||'', materia:materia||'', activo:true});
        ok++;
      } else {
        const [apellido,nombre,dni,secRaw] = partes;
        if(!apellido||!dni) return;
        if(db.usuarios.some(u=>u.usuario===dni)||nuevos.some(u=>u.usuario===dni)) return;
        let sec = secRaw||''; if(/^[1-5]$/.test(sec)) sec='Sección '+sec; if(!SECCIONES.includes(sec)) sec='Sección 1';
        nuevos.push({id:uid(), apellido, nombre:nombre||'', dni, usuario:dni, clave:'asp123', rol:'aspirante', seccion:sec, activo:true});
        ok++;
      }
    });
    setDb(d=>({...d,usuarios:[...d.usuarios,...nuevos]}));
    setMasiva(false); setTexto(''); toast(`${ok} usuarios importados ✓`);
  };
  const counts = {admin:0,docente:0,aspirante:0};
  db.usuarios.forEach(u=>counts[u.rol]++);
  const nuevoBase = ()=> tab==='docente' ? {apellido:'',nombre:'',dni:'',usuario:'',clave:'doc123',rol:'docente',jerarquia:'',materia:''}
                    : tab==='aspirante' ? {apellido:'',nombre:'',dni:'',usuario:'',clave:'asp123',rol:'aspirante',seccion:'Sección 1'}
                    : {apellido:'',nombre:'',dni:'',usuario:'',clave:'',rol:'admin'};
  const TABS=[{id:'admin',lbl:'Administración',ic:'🛡️'},{id:'docente',lbl:'Docentes',ic:'👨‍🏫'},{id:'aspirante',lbl:'Aspirantes',ic:'🎓'}];
  return (
    <div>
      <div className="page-head">
        <div><h3>👥 Usuarios</h3><p>{counts.admin} administración · {counts.docente} docentes · {counts.aspirante} aspirantes</p></div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <ExportBtns titulo={"Nómina · "+TABS.find(t=>t.id===tab).lbl} toast={toast}
            headers={tab==='aspirante'?['Apellido y nombre','Usuario','DNI','Sección','Estado']:tab==='docente'?['Apellido y nombre','Usuario','Jerarquía','Materia','Estado']:['Apellido y nombre','Usuario','DNI','Estado']}
            rows={lista.map(u=>tab==='aspirante'?[nombreCompleto(u),u.usuario,u.dni||'—',u.seccion||'—',u.activo?'Activo':'Inactivo']:tab==='docente'?[nombreCompleto(u),u.usuario,u.jerarquia||'—',u.materia||'—',u.activo?'Activo':'Inactivo']:[nombreCompleto(u),u.usuario,u.dni||'—',u.activo?'Activo':'Inactivo'])}/>
          {tab!=='admin'&&<button className="btn btn-ghost" onClick={()=>setMasiva(true)}>⇪ Carga masiva</button>}
          <button className="btn btn-primary" onClick={()=>setModal(nuevoBase())}>＋ Nuevo {tab==='admin'?'admin':tab}</button>
        </div>
      </div>
      <div className="subtabs">
        {TABS.map(t=>(
          <button key={t.id} className={"subtab "+(tab===t.id?'active':'')} onClick={()=>{setTab(t.id);setBusca('');}}>
            <span>{t.ic}</span> {t.lbl} <span className="subtab-count">{counts[t.id]}</span>
          </button>
        ))}
      </div>
      <div className="toolbar">
        <input placeholder="Buscar por nombre, usuario o DNI…" value={busca} onChange={e=>setBusca(e.target.value)} style={{flex:1,minWidth:200}}/>
      </div>
      {lista.length===0
        ? <div className="empty">Todavía no hay {tab==='admin'?'administradoras':tab+'s'} cargados. Usá <b>＋ Nuevo</b>{tab!=='admin'?' o ⇪ Carga masiva':''} para agregarlos.</div>
        : <div className="table-wrap"><table>
        <thead><tr><th>Apellido y nombre</th><th>Usuario</th>{tab==='docente'&&<><th>Jerarquía</th><th>Materia</th><th>Secciones</th></>}{tab==='aspirante'&&<><th>DNI</th><th>Sección</th></>}{tab==='admin'&&<th>DNI</th>}<th>Estado</th><th></th></tr></thead>
        <tbody>{lista.map(u=>{
          const secs = [...new Set(materiasDeDocente(db,u.id).flatMap(m=>seccionesDeDocenteEnMateria(m,u.id)))];
          return (
          <tr key={u.id} style={{opacity:u.activo?1:.45}}>
            <td style={{fontWeight:600}}>{nombreCompleto(u)}</td>
            <td style={{color:'var(--muted)'}}>{u.usuario}</td>
            {tab==='docente'&&<><td style={{fontSize:12.5}}>{u.jerarquia||'—'}</td>
              <td style={{fontSize:12.5}}>{u.materia?<span className="mat-chip">{u.materia}</span>:<span style={{color:'var(--muted)'}}>—</span>}</td>
              <td style={{fontSize:12.5}}>{secs.length?secs.map(s=>s.replace('Sección ','S')).join(', '):<span style={{color:'var(--muted)'}}>Sin asignar</span>}</td></>}
            {tab==='aspirante'&&<><td>{u.dni||'—'}</td><td>{u.seccion||'—'}</td></>}
            {tab==='admin'&&<td>{u.dni||'—'}</td>}
            <td><span className={"badge "+(u.activo?'bg-ok':'bg-bad')}>{u.activo?'Activo':'Inactivo'}</span></td>
            <td style={{whiteSpace:'nowrap'}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setModal({...u})}>Editar</button>{' '}
              <button className="btn btn-ghost btn-sm" onClick={()=>resetClave(u)}>Clave</button>{' '}
              {u.rol!=='admin'&&<button className={"btn btn-sm "+(u.activo?'btn-danger':'btn-amber')} onClick={()=>toggleActivo(u)}>{u.activo?'Baja':'Alta'}</button>}
            </td>
          </tr>
        );})}</tbody>
      </table></div>}
      {modal && (
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <h3>{modal.id?'Editar':'Nuevo'} {({admin:'administrador/a',docente:'docente',aspirante:'aspirante'})[modal.rol]}</h3>
            <div className="grid grid-2">
              <div className="field"><label>Apellido *</label><input value={modal.apellido} onChange={e=>setModal({...modal,apellido:e.target.value})}/></div>
              <div className="field"><label>Nombre</label><input value={modal.nombre} onChange={e=>setModal({...modal,nombre:e.target.value})}/></div>
            </div>
            <div className="grid grid-2">
              <div className="field"><label>DNI</label><input value={modal.dni} onChange={e=>setModal({...modal,dni:e.target.value, usuario: (!modal.id && modal.rol==='aspirante' && (!modal.usuario||modal.usuario===modal.dni))?e.target.value:modal.usuario})}/></div>
              <div className="field"><label>Usuario *</label><input value={modal.usuario} onChange={e=>setModal({...modal,usuario:e.target.value})} placeholder={modal.rol==='aspirante'?'DNI recomendado':'apellido.nombre'}/></div>
            </div>

              <div className="field"><label>Materia que dicta</label>
                <select value={modal.materia||''} onChange={e=>setModal({...modal,materia:e.target.value})}>

            <div className="grid grid-2">

              {modal.rol==='aspirante'&&<div className="field"><label>Sección</label>

                  {SECCIONES.map(s=><option key={s}>{s}</option>)}

            </div>
            {modal.rol==='docente'&&<p style={{fontSize:12.5,color:'var(--muted)',marginTop:4}}>La asignación de la materia a cada <b>sección</b> se hace desde la pestaña <b>Materias</b>.</p>}

              ? <p style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>Una línea por docente:<br/><code style={{color:'var(--amber)'}}>Apellido, Nombre, Jerarquía, Materia</code><br/>Usuario = apellido.nombre · clave inicial: <b>doc123</b>. La asignación por sección se hace luego en Materias.</p>
              : <p style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>Una línea por aspirante:<br/><code style={{color:'var(--amber)'}}>Apellido, Nombre, DNI, Sección</code><br/>Sección = 1 a 5 (o "Sección 1") · Usuario = DNI · clave inicial: <b>asp123</b>.</p>}
            <textarea rows="8" value={texto} onChange={e=>setTexto(e.target.value)} placeholder={tab==='docente'?"Acuña, Sebastián, Sargento, Bastón Rígido Policial\nRamirez, Juan, Sargento Primero, Arma y Tiro":"Acuña, Brian, 40111222, 1\nBenítez, Camila, 40222333, 2"}/>
            <div className="modal-foot">
              <button className="btn btn-ghost" onClick={()=>setMasiva(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={importar}>Importar</button>

}

/* ---------- Comunicados ---------- */
function Comunicados({db,setDb,user,toast}){
  const puede = user.rol!=='aspirante';
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({titulo:'',cuerpo:'',destino:'todos',fijado:false});
  const visibles = db.comunicados
    .filter(c=> user.rol==='admin' || c.destino==='todos' || c.destino===user.rol+'s' || (user.rol==='docente'&&c.destino==='docentes') || (user.rol==='aspirante'&&c.destino==='aspirantes'))
    .sort((a,b)=> (b.fijado?1:0)-(a.fijado?1:0) || b.fecha.localeCompare(a.fecha));
  const publicar=()=>{
    if(!form.titulo.trim()||!form.cuerpo.trim()){toast('Completá título y mensaje');return;}
    setDb(d=>({...d, comunicados:[...d.comunicados,{id:uid(), autorId:user.id, fecha:hoy(), ...form}]}));
    const dest = form.destino==='docentes'?['docente']:form.destino==='aspirantes'?['aspirante']:['admin','docente','aspirante'];
    pushNotif(setDb,{titulo:'Nuevo comunicado', detalle:form.titulo, icono:'📢', destinoRoles:dest, autorId:user.id, vista:'comunicados'});
    setModal(false); setForm({titulo:'',cuerpo:'',destino:'todos',fijado:false}); toast('Comunicado publicado ✓');
  };
  const eliminar=(id)=>{ if(confirm('¿Eliminar comunicado?')) setDb(d=>({...d,comunicados:d.comunicados.filter(c=>c.id!==id)})); };
  return (
    <div>
      <div className="page-head">
        <div><h3>📣 Comunicados</h3><p>Avisos oficiales de la Secretaría Académica y los docentes.</p></div>
        {puede&&<button className="btn btn-primary" onClick={()=>setModal(true)}>＋ Publicar</button>}
      </div>
      {visibles.length===0&&<div className="empty card"><div className="ic">📭</div>No hay comunicados publicados.</div>}
      {visibles.map(c=>(
        <div key={c.id} className={"card com-card "+(c.fijado?'pin':'')} style={{marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',gap:10}}>
            <div>
              <b style={{fontSize:15}}>{c.titulo}</b>{' '}{c.fijado&&<span className="badge bg-amber">📌 Fijado</span>}{' '}
              <span className="badge bg-violet">{({todos:'Todos',docentes:'Docentes',aspirantes:'Aspirantes'})[c.destino]}</span>
              <div style={{fontSize:12,color:'var(--muted)',margin:'4px 0 8px'}}>{fmtFecha(c.fecha)} · {nombreCompleto(db.usuarios.find(u=>u.id===c.autorId))}</div>
              <div style={{fontSize:13.5,whiteSpace:'pre-wrap'}}>{c.cuerpo}</div>
            </div>
            {(user.rol==='admin'||c.autorId===user.id)&&<button className="btn btn-danger btn-sm" style={{alignSelf:'flex-start'}} onClick={()=>eliminar(c.id)}>✕</button>}
          </div>
        </div>
      ))}
      {modal && (
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal">
            <h3>Publicar comunicado</h3>
            <div className="field"><label>Título *</label><input value={form.titulo} onChange={e=>setForm({...form,titulo:e.target.value})}/></div>
            <div className="field"><label>Mensaje *</label><textarea rows="5" value={form.cuerpo} onChange={e=>setForm({...form,cuerpo:e.target.value})}/></div>
            <div className="grid grid-2">
              <div className="field"><label>Destinatarios</label>
                <select value={form.destino} onChange={e=>setForm({...form,destino:e.target.value})}>
                  <option value="todos">Todos</option><option value="docentes">Solo docentes</option><option value="aspirantes">Solo aspirantes</option>
                </select></div>
              {user.rol==='admin'&&<div className="field"><label>Fijar arriba</label>
                <select value={form.fijado?'si':'no'} onChange={e=>setForm({...form,fijado:e.target.value==='si'})}>
                  <option value="no">No</option><option value="si">Sí, fijar</option>
                </select></div>}
            </div>
            <div className="modal-foot">
              <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancelar</button>
              <button className="btn btn-primary" onClick={publicar}>Publicar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- Calendario ---------- */
function Calendario({db,setDb,user,toast}){
  const now = new Date();
  const [mes,setMes]=useState(now.getMonth());
  const [anio,setAnio]=useState(now.getFullYear());
  const [modal,setModal]=useState(null);
  const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DIAS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const primero = new Date(anio,mes,1);
  const offset = (primero.getDay()+6)%7;
  const diasMes = new Date(anio,mes+1,0).getDate();
  const celdas=[];
  for(let i=0;i<offset;i++) celdas.push(null);
  for(let d=1;d<=diasMes;d++) celdas.push(d);
  const isoDe=(d)=>`${anio}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const nav=(dir)=>{ let m=mes+dir,a=anio; if(m<0){m=11;a--;} if(m>11){m=0;a++;} setMes(m); setAnio(a); };
  const guardar=(ev)=>{
    if(!ev.titulo.trim()){toast('Ingresá un título');return;}
    setDb(d=>({...d, eventos:[...d.eventos,{...ev,id:uid()}]}));
    pushNotif(setDb,{titulo:'Nuevo evento en el calendario', detalle:ev.titulo+' · '+fmtFecha(ev.fecha), icono:'📅', destinoRoles:['admin','docente','aspirante'], autorId:user.id, vista:'calendario'});
    setModal(null); toast('Evento agregado ✓');
  };
  const eliminar=(id)=>{ if(confirm('¿Eliminar evento?')) setDb(d=>({...d,eventos:d.eventos.filter(e=>e.id!==id)})); };
  return (
    <div>
      <div className="page-head">
        <div><h3>📅 Calendario Académico</h3><p>Exámenes, prácticas y actos institucionales.</p></div>
        {user.rol!=='aspirante'&&<button className="btn btn-primary" onClick={()=>setModal({titulo:'',fecha:hoy(),tipo:'academico'})}>＋ Evento</button>}
      </div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>nav(-1)}>‹</button>
          <b style={{fontFamily:'var(--font-display)',fontSize:17}}>{MESES[mes]} {anio}</b>
          <button className="btn btn-ghost btn-sm" onClick={()=>nav(1)}>›</button>
        </div>
        <div className="cal-head">{DIAS.map(d=><div key={d}>{d}</div>)}</div>
        <div className="cal-grid">
          {celdas.map((d,i)=>{
            if(d===null) return <div key={i} className="cal-cell off"></div>;
            const iso=isoDe(d);
            const evs=db.eventos.filter(e=>e.fecha===iso);
            return (
              <div key={i} className={"cal-cell "+(iso===hoy()?'today':'')}>
                <div className="d">{d}</div>
                {evs.map(e=>(
                  <div key={e.id} className={"cal-ev "+(e.tipo==='institucional'?'amber':'')} title={e.titulo}
                    onClick={()=>{ if(user.rol!=='aspirante') eliminar(e.id); }}>{e.titulo}</div>
                ))}
              </div>
            );
          })}
        </div>
        <div style={{marginTop:12,fontSize:12,color:'var(--muted)'}}>
          <span className="badge bg-violet">Académico</span>{' '}<span className="badge bg-amber">Institucional</span>
          {user.rol!=='aspirante'&&' · Tocá un evento para eliminarlo'}
        </div>
      </div>
      {modal && (
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <h3>Nuevo evento</h3>
            <div className="field"><label>Título *</label><input value={modal.titulo} onChange={e=>setModal({...modal,titulo:e.target.value})} placeholder="Parcial de Derecho Penal"/></div>
            <div className="grid grid-2">
              <div className="field"><label>Fecha</label><input type="date" value={modal.fecha} onChange={e=>setModal({...modal,fecha:e.target.value})}/></div>
              <div className="field"><label>Tipo</label>
                <select value={modal.tipo} onChange={e=>setModal({...modal,tipo:e.target.value})}>
                  <option value="academico">Académico</option><option value="institucional">Institucional</option>
                </select></div>
            </div>
            <div className="modal-foot">
              <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn btn-primary" onClick={()=>guardar(modal)}>Guardar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- Material de Estudio ---------- */
function Material({db,setDb,user,toast}){
  const puede = user.rol!=='aspirante';
  const misMaterias = user.rol==='docente' ? materiasDeDocente(db,user.id) : user.rol==='aspirante' ? materiasDeSeccion(db) : db.materias;
  const [modal,setModal]=useState(null);
  const visibles = db.materiales.filter(r=> misMaterias.some(m=>m.id===r.materiaId) || user.rol==='admin');
  const guardar=(r)=>{
    if(!r.titulo.trim()||!r.materiaId){toast('Completá título y materia');return;}
    setDb(d=>({...d, materiales:[...d.materiales,{...r,id:uid()}]}));
    const mat=db.materias.find(m=>m.id===r.materiaId);
    pushNotif(setDb,{titulo:'Nuevo material de estudio', detalle:(mat?.nombre||'')+' · '+r.titulo, icono:'📚', destinoRoles:['aspirante','docente'], autorId:user.id, vista:'material'});
    setModal(null); toast('Material publicado ✓');
  };
  const eliminar=(id)=>{ if(confirm('¿Eliminar material?')) setDb(d=>({...d,materiales:d.materiales.filter(r=>r.id!==id)})); };
  return (
    <div>
      <div className="page-head">
        <div><h3>🎒 Material de Estudio</h3><p>Apuntes, manuales y recursos por materia.</p></div>

      </div>
      <div className="grid grid-2">
        {visibles.map(r=>{
          const m=db.materias.find(x=>x.id===r.materiaId);
          return (
            <div key={r.id} className="card">
              <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                <div>
                  <span className="badge bg-violet">{m?.nombre||'—'}</span>{' '}<span className="badge bg-amber">{r.tipo}</span>
                  <div style={{fontWeight:600,fontSize:14.5,margin:'8px 0 3px'}}>{r.titulo}</div>

                {puede&&<button className="btn btn-danger btn-sm" style={{alignSelf:'flex-start'}} onClick={()=>eliminar(r.id)}>✕</button>}
              </div>
            </div>
          );
        })}
      </div>
      {visibles.length===0&&<div className="empty card"><div className="ic">🎒</div>Todavía no hay material publicado.</div>}
      {modal && (
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <h3>Publicar material</h3>
            <div className="field"><label>Título *</label><input value={modal.titulo} onChange={e=>setModal({...modal,titulo:e.target.value})}/></div>
            <div className="grid grid-2">
              <div className="field"><label>Materia *</label>
                <select value={modal.materiaId} onChange={e=>setModal({...modal,materiaId:e.target.value})}>
                  {misMaterias.map(m=><option key={m.id} value={m.id}>{m.nombre}</option>)}

/* =====================  ARCHIVOS (subir / descargar cualquier formato)  ===================== */
const MAX_MB = 4; // límite del modo demo en memoria; con Supabase Storage sube a 50MB+
function leerArchivo(file){
  return new Promise((res,rej)=>{
    if(file.size > MAX_MB*1024*1024){ rej(new Error(`El archivo supera los ${MAX_MB}MB del modo demo. Con Supabase Storage el límite será mucho mayor.`)); return; }
    const r=new FileReader();
    r.onload=()=>res({nombre:file.name, tipo:file.type||'archivo', size:file.size, dataURL:r.result});
    r.onerror=()=>rej(new Error('No se pudo leer el archivo'));
    r.readAsDataURL(file);
  });
}
const fmtSize=(b)=> b>1048576 ? (b/1048576).toFixed(1)+' MB' : Math.max(1,Math.round(b/1024))+' KB';
function FotoPicker({onFile}){
  const ref=useRef(null);
  return (
    <>
      <button className="btn btn-ghost btn-sm" onClick={()=>ref.current.click()}>📷 Subir foto</button>
      <input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={e=>{onFile(e.target.files[0]); e.target.value='';}}/>
    </>
  );
}
function FileChip({archivo,onQuitar}){
  if(!archivo) return null;
  return (
    <span className="file-chip">
      📎 <span className="nm">{archivo.nombre}</span>
      <span style={{color:'var(--muted)'}}>{fmtSize(archivo.size)}</span>
      <a href={archivo.dataURL} download={archivo.nombre} style={{textDecoration:'none'}}>⬇</a>
      {onQuitar && <button className="btn btn-danger btn-sm" style={{padding:'1px 7px'}} onClick={onQuitar}>✕</button>}
    </span>
  );
}
function FileDrop({onFile,toast,label}){
  const ref=useRef(null);
  const pick=async(f)=>{ if(!f) return; try{ onFile(await leerArchivo(f)); }catch(e){ toast(e.message); } };
  return (
    <div>
      <div className="drop" onClick={()=>ref.current.click()}
        onDragOver={e=>e.preventDefault()}
        onDrop={e=>{e.preventDefault(); pick(e.dataTransfer.files[0]);}}>
        📎 {label||'Tocá o arrastrá un archivo aquí'} <span style={{opacity:.6}}>(cualquier formato · hasta {MAX_MB}MB en demo)</span>
      </div>
      <input ref={ref} type="file" style={{display:'none'}} onChange={e=>pick(e.target.files[0])}/>
    </div>
  );
}

/* =====================  FIRMA DIGITAL (dibujada a mano)  ===================== */
function SignaturePad({onSave,onCancel}){
  const ref=useRef(null);
  const dib=useRef(false);
  useEffect(()=>{
    const cv=ref.current; const ctx=cv.getContext('2d');
    cv.width=cv.offsetWidth*2; cv.height=cv.offsetHeight*2; ctx.scale(2,2);
    ctx.strokeStyle='#1B1430'; ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.lineJoin='round';
    const pos=(e)=>{ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:t.clientX-r.left, y:t.clientY-r.top}; };
    const down=(e)=>{ e.preventDefault(); dib.current=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
    const move=(e)=>{ if(!dib.current) return; e.preventDefault(); const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); };
    const up=()=>{ dib.current=false; };
    cv.addEventListener('mousedown',down); cv.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
    cv.addEventListener('touchstart',down,{passive:false}); cv.addEventListener('touchmove',move,{passive:false}); cv.addEventListener('touchend',up);
    return ()=>{ window.removeEventListener('mouseup',up); };
  },[]);
  const limpiar=()=>{ const cv=ref.current; cv.getContext('2d').clearRect(0,0,cv.width,cv.height); };
  return (
    <div>
      <canvas ref={ref} className="sig-canvas"></canvas>
      <div style={{display:'flex',gap:8,marginTop:10,justifyContent:'flex-end'}}>
        <button className="btn btn-ghost btn-sm" onClick={limpiar}>Limpiar</button>
        {onCancel&&<button className="btn btn-ghost btn-sm" onClick={onCancel}>Cancelar</button>}
        <button className="btn btn-primary btn-sm" onClick={()=>onSave(ref.current.toDataURL('image/png'))}>Guardar firma ✓</button>
      </div>
    </div>
  );
}
