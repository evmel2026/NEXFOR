  const [ex,setEx]=useState(base);
  const [q,setQ]=useState(null);
  const addQ=()=>setQ({tipo:'mc',enunciado:'',opciones:['','','',''],correcta:0,puntos:1});
  const saveQ=()=>{
    if(!q.enunciado.trim()){toast('Escribí el enunciado');return;}
    if(q.tipo==='mc' && q.opciones.filter(o=>o.trim()).length<2){toast('Cargá al menos 2 opciones');return;}
    const limpio = q.tipo==='mc' ? {...q,opciones:q.opciones.filter(o=>o.trim())} : q;
    setEx(e=>({...e, preguntas:[...e.preguntas, {...limpio, id:uid()}]}));
    setQ(null);
  };
  const guardarExamen=(publicar)=>{
    if(!ex.titulo.trim()){toast('Poné un título al examen');return;}
    if(ex.preguntas.length===0){toast('Agregá al menos una pregunta');return;}
    setDb(d=>({...d, examenes:[...d.examenes, {...ex, id:uid(), materiaId:materia.id, docenteId:user.id, fecha:hoy(), publicado:publicar}]}));
    if(publicar) pushNotif(setDb,{titulo:'Nuevo examen disponible', detalle:(materia?.nombre||'')+' · '+ex.titulo, icono:'📋', destinoRoles:['aspirante'], autorId:user.id, vista:'aula'});
    toast(publicar?'Examen publicado ✓ Los aspirantes ya pueden rendirlo':'Examen guardado como borrador ✓');
    onSalir();
  };
  return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={onSalir} style={{marginBottom:12}}>‹ Volver</button>
      <div className="card" style={{marginBottom:14}}>
        <h4 style={{marginBottom:12}}>Nuevo examen · {materia.nombre}</h4>
        <div className="field"><label>Título *</label><input value={ex.titulo} onChange={e=>setEx({...ex,titulo:e.target.value})} placeholder="Parcial N°1"/></div>
        <div className="grid grid-2">
          <div className="field"><label>Duración (minutos)</label><input type="number" min="1" value={ex.duracionMin} onChange={e=>setEx({...ex,duracionMin:Math.max(1,Number(e.target.value)||1)})}/></div>
          <div className="field"><label>Mezclar preguntas</label>
            <select value={ex.mezclar?'si':'no'} onChange={e=>setEx({...ex,mezclar:e.target.value==='si'})}>
              <option value="si">Sí (orden aleatorio por aspirante)</option><option value="no">No</option>
            </select></div>
        </div>
      </div>
      {ex.preguntas.map((p,i)=>(
        <div key={p.id} className="q-card">
          <div className="qn">PREGUNTA {i+1} · {({mc:'OPCIÓN MÚLTIPLE (autocorrige)',vf:'V/F (autocorrige)',des:'DESARROLLO (corrige el docente)'})[p.tipo]} · {p.puntos} PTS</div>
          <div style={{fontSize:14}}>{p.enunciado}</div>
          {p.tipo==='mc' && p.opciones.map((o,j)=><div key={j} style={{fontSize:13,color:j===p.correcta?'var(--ok)':'var(--muted)',marginTop:3}}>{j===p.correcta?'✓ ':'· '}{o}</div>)}
          {p.tipo==='vf' && <div style={{fontSize:13,color:'var(--ok)',marginTop:3}}>✓ Respuesta correcta: {p.correcta?'Verdadero':'Falso'}</div>}
          <button className="btn btn-danger btn-sm" style={{marginTop:8}} onClick={()=>setEx(e=>({...e,preguntas:e.preguntas.filter(x=>x.id!==p.id)}))}>Quitar</button>
        </div>
      ))}
      {!q && <button className="btn btn-ghost" onClick={addQ}>＋ Agregar pregunta</button>}
      {q && (
        <div className="card" style={{borderColor:'var(--violet)'}}>
          <div className="grid grid-2">
            <div className="field"><label>Tipo</label>
              <select value={q.tipo} onChange={e=>setQ({...q,tipo:e.target.value, correcta:e.target.value==='vf'?true:0})}>
                <option value="mc">Opción múltiple (autocorrige)</option>
                <option value="vf">Verdadero / Falso (autocorrige)</option>
                <option value="des">Desarrollo (corrige el docente)</option>
              </select></div>
            <div className="field"><label>Puntos</label><input type="number" min="1" value={q.puntos} onChange={e=>setQ({...q,puntos:Math.max(1,Number(e.target.value)||1)})}/></div>
          </div>
          <div className="field"><label>Enunciado *</label><textarea rows="2" value={q.enunciado} onChange={e=>setQ({...q,enunciado:e.target.value})}/></div>
          {q.tipo==='mc' && q.opciones.map((o,j)=>(
            <div key={j} style={{display:'flex',gap:8,alignItems:'center',marginBottom:7}}>
              <input type="radio" style={{width:'auto'}} name="correcta" checked={q.correcta===j} onChange={()=>setQ({...q,correcta:j})} title="Marcar como correcta"/>
              <input value={o} onChange={e=>setQ({...q,opciones:q.opciones.map((x,k)=>k===j?e.target.value:x)})} placeholder={`Opción ${j+1}`}/>
            </div>
          ))}
          {q.tipo==='vf' && <div className="field"><label>Respuesta correcta</label>
            <select value={q.correcta?'v':'f'} onChange={e=>setQ({...q,correcta:e.target.value==='v'})}>
              <option value="v">Verdadero</option><option value="f">Falso</option>
            </select></div>}
          <div className="modal-foot">
            <button className="btn btn-ghost" onClick={()=>setQ(null)}>Cancelar</button>
            <button className="btn btn-primary" onClick={saveQ}>Agregar pregunta ✓</button>
          </div>
        </div>
      )}
      <div style={{display:'flex',gap:10,marginTop:16,justifyContent:'flex-end'}}>
        <button className="btn btn-ghost" onClick={()=>guardarExamen(false)}>Guardar borrador</button>
        <button className="btn btn-primary" onClick={()=>guardarExamen(true)}>Publicar examen 🚀</button>
      </div>
    </div>
  );
}

function RendirExamen({db,setDb,user,toast,examen,onSalir}){
  const [orden] = useState(()=> examen.mezclar ? [...examen.preguntas].sort(()=>Math.random()-.5) : examen.preguntas);
  const [resp,setResp]=useState({});
  const [seg,setSeg]=useState(examen.duracionMin*60);
  const [resultado,setResultado]=useState(null);
  const entregado = useRef(false);
  useEffect(()=>{
    if(resultado) return;
    const t=setInterval(()=>setSeg(s=>{ if(s<=1){ clearInterval(t); entregar(true); return 0;} return s-1; }),1000);
    return ()=>clearInterval(t);
  },[resultado]);
  const entregar=(porTiempo)=>{
    if(entregado.current) return; entregado.current=true;
    let autoPts=0, autoMax=0; const detalle={};
    examen.preguntas.forEach(q=>{
      if(q.tipo==='des') return;
      autoMax+=q.puntos;
      const ok = q.tipo==='mc' ? resp[q.id]===q.correcta : resp[q.id]===q.correcta;
      detalle[q.id]=ok;
      if(ok) autoPts+=q.puntos;
    });
    const total = examen.preguntas.reduce((s,q)=>s+q.puntos,0);
    const tieneDes = examen.preguntas.some(q=>q.tipo==='des');
    const nota = tieneDes ? null : Math.round(autoPts/total*10*10)/10;
    setDb(d=>({...d, intentos:[...d.intentos,{id:uid(), examenId:examen.id, aspiranteId:user.id, respuestas:resp, autoPts, autoMax, nota, fecha:hoy(), desPts:{}}]}));
    setResultado({autoPts,autoMax,nota,detalle,porTiempo,tieneDes});
    if(porTiempo) toast('⏱ Se acabó el tiempo: el examen se entregó automáticamente');
  };
  const mm=String(Math.floor(seg/60)).padStart(2,'0'), ss=String(seg%60).padStart(2,'0');
  if(resultado){
    return (
      <div className="card" style={{textAlign:'center',padding:32}}>
        <div style={{fontSize:40,marginBottom:8}}>{resultado.nota==null?'📨':resultado.nota>=6?'🎉':'💪'}</div>
        <h3>Examen entregado</h3>
        <p style={{color:'var(--muted)',margin:'8px 0 16px'}}>Corrección automática: <b style={{color:'var(--violet-soft)'}}>{resultado.autoPts}/{resultado.autoMax} pts</b></p>
        {resultado.nota!=null
          ? <div className={"badge "+(resultado.nota>=6?'bg-ok':'bg-bad')} style={{fontSize:18,padding:'8px 22px'}}>Nota final: {resultado.nota}/10</div>
          : <div className="badge bg-warn" style={{fontSize:13,padding:'8px 16px'}}>Las preguntas de desarrollo las corrige el docente; tu nota final aparecerá aquí.</div>}
        <div style={{marginTop:22}}><button className="btn btn-primary" onClick={onSalir}>Volver al aula</button></div>
      </div>
    );
  }
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}}>
        <div><h4>{examen.titulo}</h4><span style={{fontSize:12.5,color:'var(--muted)'}}>Respondé y entregá antes de que termine el tiempo.</span></div>
        <div className={"timer-pill "+(seg<60?'low':'')}>⏱ {mm}:{ss}</div>
      </div>
      {orden.map((p,i)=>(
        <div key={p.id} className="q-card">
          <div className="qn">PREGUNTA {i+1} · {p.puntos} PTS</div>
          <div style={{fontSize:14.5,marginBottom:6}}>{p.enunciado}</div>
          {p.tipo==='mc' && p.opciones.map((o,j)=>(
            <div key={j} className={"q-opt "+(resp[p.id]===j?'sel':'')} onClick={()=>setResp({...resp,[p.id]:j})}>
              <span>{String.fromCharCode(65+j)}</span> {o}
            </div>
          ))}
          {p.tipo==='vf' && [true,false].map(v=>(
            <div key={String(v)} className={"q-opt "+(resp[p.id]===v?'sel':'')} onClick={()=>setResp({...resp,[p.id]:v})}>{v?'Verdadero':'Falso'}</div>
          ))}
          {p.tipo==='des' && <textarea rows="4" placeholder="Escribí tu respuesta…" value={resp[p.id]||''} onChange={e=>setResp({...resp,[p.id]:e.target.value})}/>}
        </div>
      ))}
      <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
        <button className="btn btn-ghost" onClick={onSalir}>Cancelar</button>
        <button className="btn btn-primary" onClick={()=>entregar(false)}>Entregar examen ✓</button>
      </div>
    </div>
  );
}

function ResultadosExamen({db,setDb,toast,examen}){
  const intentos = db.intentos.filter(i=>i.examenId===examen.id);
  const total = examen.preguntas.reduce((s,q)=>s+q.puntos,0);
  const corregirDes=(intento, pid, pts)=>{
    setDb(d=>({...d, intentos:d.intentos.map(it=>{
      if(it.id!==intento.id) return it;
      const desPts={...it.desPts,[pid]:pts};
      const desPreguntas = examen.preguntas.filter(q=>q.tipo==='des');
      const completo = desPreguntas.every(q=>desPts[q.id]!=null);
      const sumaDes = desPreguntas.reduce((s,q)=>s+(desPts[q.id]||0),0);
      const nota = completo ? Math.round((it.autoPts+sumaDes)/total*10*10)/10 : null;
      return {...it, desPts, nota};
    })}));
  };
  return (
    <div style={{marginTop:14,borderTop:'1px solid var(--line)',paddingTop:12}}>
      {intentos.length===0 && <div style={{color:'var(--muted)',fontSize:13}}>Nadie rindió todavía.</div>}
      {intentos.map(it=>{
        const asp=db.usuarios.find(u=>u.id===it.aspiranteId);
        const des = examen.preguntas.filter(q=>q.tipo==='des');
        return (
          <div key={it.id} style={{padding:'10px 0',borderBottom:'1px solid var(--line)'}}>
            <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
              <b style={{fontSize:13.5}}>{nombreCompleto(asp)} <span style={{color:'var(--muted)',fontWeight:400}}>· {fmtFecha(it.fecha)}</span></b>
              <span>
                <span className="badge bg-violet">Auto: {it.autoPts}/{it.autoMax}</span>{' '}
                {it.nota!=null ? <span className={"badge "+(it.nota>=6?'bg-ok':'bg-bad')}>Nota: {it.nota}/10</span> : <span className="badge bg-warn">Falta corregir desarrollo</span>}
              </span>
            </div>
            {des.map(q=>(
              <div key={q.id} style={{marginTop:8,background:'var(--bg)',border:'1px solid var(--line)',borderRadius:10,padding:10}}>
                <div style={{fontSize:12,color:'var(--muted)'}}>{q.enunciado} <span className="badge bg-amber">{q.puntos} pts</span></div>
                <div style={{fontSize:13.5,margin:'5px 0',whiteSpace:'pre-wrap'}}>{it.respuestas[q.id]||<i style={{color:'var(--muted)'}}>Sin respuesta</i>}</div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input className="note-input" type="number" min="0" max={q.puntos} placeholder="Pts" defaultValue={it.desPts[q.id]??''}
                    onBlur={e=>{ const v=e.target.value; if(v!=='') corregirDes(it,q.id,Math.max(0,Math.min(q.puntos,Number(v)))); }}/>
                  <span style={{fontSize:12,color:'var(--muted)'}}>de {q.puntos} pts (la nota final se recalcula sola)</span>
                </div>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

/* ---------- Foro de consultas ---------- */
function Foro({db,setDb,user,toast,materia}){
  const [texto,setTexto]=useState('');
  const [resp,setResp]=useState({});
  const hilos = db.foro.filter(f=>f.materiaId===materia.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const publicar=()=>{
    if(!texto.trim()){toast('Escribí tu consulta');return;}
    setDb(d=>({...d, foro:[...d.foro,{id:uid(), materiaId:materia.id, autorId:user.id, fecha:hoy(), texto:texto.trim(), respuestas:[]}]}));
    setTexto(''); toast('Consulta publicada ✓');
  };
  const responder=(hiloId)=>{
    const t=(resp[hiloId]||'').trim(); if(!t){toast('Escribí una respuesta');return;}
    setDb(d=>({...d, foro:d.foro.map(f=>f.id===hiloId?{...f,respuestas:[...f.respuestas,{id:uid(),autorId:user.id,fecha:hoy(),texto:t}]}:f)}));
    setResp({...resp,[hiloId]:''});
  };
  return (
    <div>
      <div className="card" style={{marginBottom:14}}>
        <div className="field" style={{marginBottom:8}}><label>Nueva consulta en {materia.nombre}</label>
        <textarea rows="2" value={texto} onChange={e=>setTexto(e.target.value)} placeholder="Escribí tu pregunta para el docente y compañeros…"/></div>
        <button className="btn btn-primary btn-sm" onClick={publicar}>Publicar consulta</button>
      </div>
      {hilos.length===0 && <div className="empty card"><div className="ic">💬</div>Sin consultas todavía. ¡Rompé el hielo!</div>}
      {hilos.map(f=>{
        const autor=db.usuarios.find(u=>u.id===f.autorId);
        return (
          <div key={f.id} className="card" style={{marginBottom:12}}>
            <div style={{fontSize:12,color:'var(--muted)'}}>{nombreCompleto(autor)} · <span className={"badge "+({admin:'bg-amber',docente:'bg-violet',aspirante:'bg-info'})[autor?.rol]}>{ROLES[autor?.rol]||''}</span> · {fmtFecha(f.fecha)}</div>
            <div style={{fontSize:14,margin:'6px 0 10px'}}>{f.texto}</div>
            {f.respuestas.map(r=>{
              const ra=db.usuarios.find(u=>u.id===r.autorId);
              return (
                <div key={r.id} style={{borderLeft:'2px solid '+(ra?.rol==='docente'||ra?.rol==='admin'?'var(--amber)':'var(--line)'),paddingLeft:12,margin:'8px 0'}}>
                  <div style={{fontSize:11.5,color:'var(--muted)'}}>{nombreCompleto(ra)} {(ra?.rol==='docente'||ra?.rol==='admin')&&<span className="badge bg-amber">Respuesta oficial</span>} · {fmtFecha(r.fecha)}</div>
                  <div style={{fontSize:13.5}}>{r.texto}</div>
                </div>
              );
            })}
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <input placeholder="Responder…" value={resp[f.id]||''} onChange={e=>setResp({...resp,[f.id]:e.target.value})} onKeyDown={e=>e.key==='Enter'&&responder(f.id)}/>
              <button className="btn btn-ghost btn-sm" onClick={()=>responder(f.id)}>↩</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* =====================  NEXIA · Asistente IA propio  ===================== */
/* NIVEL 2 · consultas analíticas sobre la base de datos (admin/docente) */
function consultaDatosNexia(db,user,t){
  const esAdmin = user.rol==='admin';
  const esStaff = user.rol!=='aspirante';
  const norm = (s)=> (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  const tn = norm(t);
  const aspirantes = db.usuarios.filter(u=>u.rol==='aspirante'&&u.activo);
  const docentes = db.usuarios.filter(u=>u.rol==='docente'&&u.activo);
  const prom = (aspId)=>{ const cs=db.calificaciones.filter(c=>c.aspiranteId===aspId); const n=cs.flatMap(c=>['parcial1','parcial2','tp','final'].map(k=>c[k]).filter(x=>x!=null)); return n.length?n.reduce((a,b)=>a+b,0)/n.length:null; };

  // ----- consultas que requieren rol staff -----
  if(esStaff){
    // ¿cuántos aspirantes faltaron hoy?
    if((tn.includes('falt')||tn.includes('ausent')) && (tn.includes('hoy'))){
      const regsHoy=db.asistencias.filter(a=>a.fecha===hoy());
      if(!regsHoy.length) return '📅 Hoy todavía no hay asistencia cargada, así que no puedo contar ausentes. Cuando los docentes tomen lista, te lo informo al instante.';
      const aus=regsHoy.filter(a=>a.estado==='A');
      if(!aus.length) return '✅ Hoy no se registraron ausentes sobre '+regsHoy.length+' aspirante(s) con lista tomada. ¡Asistencia completa!';
      const nombres=aus.map(a=>nombreCompleto(db.usuarios.find(u=>u.id===a.aspiranteId))).slice(0,15);
      return `📊 Hoy faltaron ${aus.length} aspirante(s) sobre ${regsHoy.length} con lista tomada:\n• ${nombres.join('\n• ')}${aus.length>15?'\n…y más':''}`;
    }
    // aspirantes con bajo rendimiento / riesgo
    if((tn.includes('bajo rendimiento')||tn.includes('riesgo')||tn.includes('peor')||tn.includes('desaprob')||tn.includes('mal'))&&(tn.includes('aspirante')||tn.includes('rinde')||tn.includes('rendimiento')||tn.includes('alumno'))){
      const bajos=aspirantes.map(a=>({a,p:prom(a.id)})).filter(x=>x.p!=null&&x.p<6).sort((a,b)=>a.p-b.p);
      if(!bajos.length) return '✅ Ningún aspirante con bajo rendimiento por ahora (todos con promedio ≥ 6 o sin notas cargadas).';
      return `📉 ${bajos.length} aspirante(s) con rendimiento a vigilar (promedio < 6):\n`+bajos.slice(0,12).map(x=>`• ${nombreCompleto(x.a)} (${x.a.seccion||'—'}) · prom. ${Math.round(x.p*10)/10}`).join('\n');
    }
    // docentes que no cargaron asistencia hoy
    if(tn.includes('docente')&&(tn.includes('no carg')||tn.includes('sin carg')||tn.includes('falta carg'))&&(tn.includes('asistencia')||tn.includes('lista'))){
      const conCarga=new Set(db.asistencias.filter(a=>a.fecha===hoy()).map(a=>a.docenteId));
      const sin=docentes.filter(d=>!conCarga.has(d.id));
      if(!sin.length) return '✅ Todos los docentes activos cargaron asistencia hoy.';
      return `🗓️ ${sin.length} docente(s) sin asistencia cargada hoy:\n`+sin.slice(0,15).map(d=>`• ${nombreCompleto(d)}`).join('\n');
    }
    // docentes que no cargaron en libro de temas
    if(tn.includes('docente')&&(tn.includes('no carg')||tn.includes('sin carg'))&&(tn.includes('tema')||tn.includes('libro')||tn.includes('clase'))){
      const sin=docentes.filter(d=>!db.libroTemas.some(x=>x.docenteId===d.id));
      if(!sin.length) return '✅ Todos los docentes registraron al menos una clase en el Libro de Temas.';
      return `📖 ${sin.length} docente(s) sin clases en el Libro de Temas:\n`+sin.slice(0,15).map(d=>`• ${nombreCompleto(d)}`).join('\n');
    }
    // mejores promedios / ranking
    if((tn.includes('mejor')||tn.includes('ranking')||tn.includes('merito')||tn.includes('promedio'))&&(tn.includes('aspirante')||tn.includes('ranking')||tn.includes('mejor')||tn.includes('merito'))){
      const top=aspirantes.map(a=>({a,p:prom(a.id)})).filter(x=>x.p!=null).sort((a,b)=>b.p-a.p).slice(0,8);
      if(!top.length) return 'Todavía no hay calificaciones cargadas para armar un ranking.';
      return '🏆 Ranking de mérito (Top '+top.length+'):\n'+top.map((x,i)=>`${i+1}. ${nombreCompleto(x.a)} · ${Math.round(x.p*10)/10}`).join('\n');
    }
    // conteos: cuántos aspirantes / docentes
    if(tn.includes('cuant')||tn.includes('cuánt')){
      if(tn.includes('aspirante')){
        if(tn.includes('seccion')||tn.includes('sección')){
          return '👥 Aspirantes por sección:\n'+SECCIONES.map(s=>`• ${s}: ${aspirantes.filter(a=>a.seccion===s).length}`).join('\n');
        }
        return `👥 Hay ${aspirantes.length} aspirante(s) activos en total.`;
      }
      if(tn.includes('docente')) return `👮 Hay ${docentes.length} docente(s) activos.`;
      if(tn.includes('materia')) return `📚 El plan tiene ${db.materias.length} materia(s).`;
      if(tn.includes('comunicado')) return `📢 Se publicaron ${db.comunicados.length} comunicado(s).`;
      if(tn.includes('tramite')||tn.includes('trámite')||tn.includes('mesa')) return `📥 Hay ${(db.tramites||[]).length} trámite(s) en Mesa de Entradas, ${(db.tramites||[]).filter(x=>x.estado==='recibido').length} sin procesar.`;
    }
    // asistencia de una sección concreta
    const secM=tn.match(/secci[oó]n\s*(\d)/);
    if(secM && tn.includes('asistencia')){
      const sec='Sección '+secM[1];
      const ids=aspirantes.filter(a=>a.seccion===sec).map(a=>a.id);
      const regs=db.asistencias.filter(a=>ids.includes(a.aspiranteId));
      if(!regs.length) return `Todavía no hay asistencia registrada para ${sec}.`;
      const p=Math.round(regs.filter(a=>a.estado==='P'||a.estado==='T'||a.estado==='J').length/regs.length*100);
      return `🏫 ${sec} tiene una asistencia del ${p}%. ${p<70?'⚠️ Está por debajo del umbral recomendado.':'En buen nivel.'}`;
    }
    // comunicados recientes
    if((tn.includes('comunicado')||tn.includes('aviso'))&&(tn.includes('recient')||tn.includes('ultimo')||tn.includes('último')||tn.includes('mostra')||tn.includes('cuales')||tn.includes('cuáles'))){
      const cs=[...db.comunicados].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,5);
      if(!cs.length) return 'No hay comunicados publicados todavía.';
      return '📢 Últimos comunicados:\n'+cs.map(c=>`• ${c.titulo} (${fmtFecha(c.fecha)})`).join('\n');
    }
    // buscar un aspirante/docente por apellido
    if(tn.includes('buscar')||tn.includes('datos de')||tn.includes('legajo de')||tn.includes('informacion de')||tn.includes('información de')){
      const persona=[...aspirantes,...docentes].find(u=>tn.includes(norm(u.apellido)) && norm(u.apellido).length>2);
      if(persona){
        if(persona.rol==='aspirante'){
          const p=prom(persona.id), pc=pctAsistencia(db,persona.id,null);
          return `🗂️ ${nombreCompleto(persona)} · Aspirante\n• Sección: ${persona.seccion||'—'}\n• DNI: ${persona.dni||'—'}\n• Promedio: ${p==null?'sin notas':Math.round(p*10)/10}\n• Asistencia: ${pc==null?'sin registros':pc+'%'}`;
        }
        const mats=materiasDeDocente(db,persona.id).map(m=>m.nombre);
        return `🗂️ ${nombreCompleto(persona)} · Docente\n• Jerarquía: ${persona.jerarquia||'—'}\n• Materia: ${persona.materia||'—'}\n• Asignado en: ${mats.length?mats.join(', '):'sin asignación'}`;
      }
    }
  }
  return null; // no es consulta de datos → sigue el motor por palabras clave
}

function respuestaLocalNexia(db,user,texto){
  const t=texto.toLowerCase();
  /* 1) Respuestas entrenadas por la Secretaría Académica (modo fuera de línea) */
  for(const f of (db.nexiaFAQ||[])){
    const claves=f.claves.split(',').map(x=>x.trim().toLowerCase()).filter(Boolean);
    if(claves.some(c=>t.includes(c))) return f.respuesta;
  }
  /* 2) NIVEL 2 · consulta directa a la base de datos */
  const datos = consultaDatosNexia(db,user,texto);
  if(datos) return datos;
  if(t.includes('tiro')||t.includes('polígono')||t.includes('poligono')||t.includes('puntería')||t.includes('punteria')){
    if(user.rol==='aspirante'){
      const ses=db.tiroSesiones.filter(s=>s.aspiranteId===user.id);
      if(!ses.length) return 'Todavía no tenés prácticas de tiro registradas. Cuando hagas tu primera práctica en el polígono vas a ver tu precisión y evolución en el Centro de Simulación 🎯.';
      const prom=Math.round(ses.reduce((a,s)=>a+s.impactos/s.disparos*100,0)/ses.length);
      return `Tenés ${ses.length} práctica(s) de tiro registradas con una precisión promedio del ${prom}%. ${prom>=70?'¡Excelente puntería! 🎯':'Seguí practicando la empuñadura y la respiración: la constancia mejora la precisión.'} Mirá tu evolución en el Centro de Simulación.`;
    }
    return 'En el Centro de Simulación → Polígono de Tiro registrás cada práctica (arma, distancia, disparos e impactos) y NEXFOR calcula la precisión y la evolución de cada aspirante automáticamente.';
  }
  if(t.includes('simulac')||t.includes('escenario')||t.includes('procedimiento')||t.includes('bastón')||t.includes('baston')||t.includes('defensa')){
    return user.rol==='aspirante'
      ? 'En el Centro de Simulación 🎯 tenés simulacros interactivos de procedimientos y defensa policial: situaciones reales donde elegís cómo actuar y recibís la corrección al instante. Tu puntaje queda registrado.'
      : 'En el Centro de Simulación podés crear simulacros de decisión (control vehicular, uso del BRP, procedimientos) paso a paso con feedback automático, y ver los resultados de cada aspirante.';
  }
  if(t.includes('asistencia')||t.includes('presente')||t.includes('falta')){
    if(user.rol==='aspirante'){
      const p=pctAsistencia(db,user.id,null);
      return p===null?'Todavía no tenés registros de asistencia cargados. Cuando tus docentes tomen lista vas a ver tu porcentaje en la pestaña Asistencia.':`Tu asistencia general es del ${p}%. ${p>=80?'¡Vas muy bien, seguí así! 💪':'Está por debajo del 80% requerido: tratá de no faltar y, si tenés justificativos, presentalos en la Secretaría Académica.'}`;
    }
    return 'Para tomar asistencia entrá a la pestaña Asistencia, elegí la materia y la fecha, y marcá P/A/T/J por cada aspirante. Con "Marcar todos Presente" cargás rápido y corregís las excepciones.';
  }
  if(t.includes('nota')||t.includes('calificac')||t.includes('promedio')){
    if(user.rol==='aspirante'){
      const cals=db.calificaciones.filter(c=>c.aspiranteId===user.id);
      if(!cals.length) return 'Todavía no tenés notas cargadas. Cuando tus docentes las publiquen las vas a ver en Calificaciones, junto con tu promedio por materia.';
      return `Tenés notas cargadas en ${cals.length} materia(s). Entrá a Calificaciones para ver el detalle y tus promedios.`;
    }
    return 'En Calificaciones podés cargar 1° y 2° parcial, TP y final por aspirante; el promedio se calcula solo. Las notas de exámenes del Aula Virtual con preguntas cerradas se corrigen automáticamente.';
  }
  if(t.includes('examen')||t.includes('parcial')||t.includes('rendir')){
    const exs=db.examenes.filter(e=>e.publicado);
    if(user.rol==='aspirante') return `Hay ${exs.length} examen(es) publicados en el Aula Virtual. Tienen tiempo límite y las preguntas cerradas se corrigen al instante. Consejo: repasá el Libro de Temas de cada materia antes de rendir.`;
    return 'En Aula Virtual → Exámenes podés crear evaluaciones con opción múltiple y V/F que se corrigen solas, más preguntas de desarrollo que corregís vos. Podés mezclar el orden de preguntas para cada aspirante y fijar duración.';
  }
  if(t.includes('tema')||t.includes('libro')){
    const hoyT=db.libroTemas.filter(x=>x.fecha===hoy());
    return `Hoy se registraron ${hoyT.length} clase(s) en el Libro de Temas. ${user.rol==='aspirante'?'Podés repasar los temas dictados de tus materias en la pestaña Libro de Temas.':'Recordá registrar y firmar digitalmente cada clase dictada.'}`;
  }
  if(t.includes('actividad')||t.includes('entrega')||t.includes('trabajo')||t.includes('tp')){
    return user.rol==='aspirante'
      ? 'Las actividades están en el Aula Virtual de cada materia. Podés subir tu trabajo en cualquier formato (PDF, Word, foto, audio…) y ahí mismo vas a recibir la nota y la devolución del docente.'
      : 'En Aula Virtual → Actividades podés publicar consignas con archivo adjunto, recibir las entregas de los aspirantes en cualquier formato y corregirlas con nota y devolución.';
  }
  if(t.includes('escáner')||t.includes('escaner')||t.includes('plagio')||t.includes('hecho con ia')||t.includes('detectar ia')||t.includes('chatgpt')){
    return user.rol==='aspirante'
      ? 'Los docentes cuentan con el Escáner NEXIA 🔍, que analiza si un trabajo fue redactado con IA y cuánto usa el material de la cátedra. Consejo: escribí con tus palabras y citá el material visto en clase — se nota, y para bien.'
      : 'En NEXIA → Escáner de Trabajos 🔍 pegás el texto del trabajo (y opcionalmente tu material de cátedra) y obtenés un índice de señales de IA con desglose, más el porcentaje de uso real de tu material. Es orientativo: usalo para decidir un coloquio oral.';
  }
  if(t.includes('mesa de entrada')||t.includes('trámite')||t.includes('tramite')||t.includes('presentaci')||t.includes('whatsapp')){
    return 'En la Mesa de Entradas 📥 podés presentar planificaciones, notas, certificados o pedidos con archivo adjunto. Recibís un número de trámite (NEX-año-####) y podés seguir su estado. Nada se pierde, aunque la Secretaría no esté conectada.';
  }
  if(t.includes('legajo')||t.includes('insignia')||t.includes('mérito')||t.includes('merito')){
    return user.rol==='aspirante'
      ? 'Tu Legajo Digital 🗂️ reúne automáticamente toda tu trayectoria: asistencia, notas, tiro, simulacros e insignias de mérito (🗓️ Presentismo Ejemplar, 📊 Cuadro de Honor, 🎯 Tirador Destacado, 🧩 Criterio Operativo). ¡Se ganan con esfuerzo!'
      : 'En Legajo Digital 🗂️ tenés la ficha integral de cada aspirante generada automáticamente, con asistencia, notas, tiro, simulacros e insignias. Se descarga en PDF con membrete institucional.';
  }
  if(t.includes('nexfor')||t.includes('plataforma')||t.includes('qué es')||t.includes('que es')){
    return 'NEXFOR nace de nexo y formación: el punto de encuentro entre la enseñanza tradicional de la Escuela y las herramientas del futuro. Un nexo entre el aspirante, el docente y el conocimiento, que forma agentes preparados para servir. Fue desarrollada por la Secretaría Académica (MLF&EV) del DCFyCCCO.';
  }
  if(t.includes('hola')||t.includes('buen')) return `¡Hola ${user.nombre}! Soy NEXIA, el asistente de NEXFOR. Puedo ayudarte con tu asistencia, notas, exámenes, actividades y el uso de la plataforma. ¿Qué necesitás?`;
  return 'Esa no la tengo aprendida todavía 🤔. Puedo ayudarte con: 📊 notas · 🗓️ asistencia · 🧠 exámenes · 📝 actividades · 🎯 tiro y simulacros · 📖 libro de temas. Si tu consulta es para la Secretaría Académica, dejala en el buzón 📨 de aquí abajo y te responden apenas se conecten.';
}

function NexiaChat({db,setDb,user,toast}){
  const bienvenida = user.rol==='aspirante'
    ? `¡Hola ${user.nombre}! Soy NEXIA ✦ el copiloto inteligente de NEXFOR. Preguntame por tu asistencia, notas, exámenes, prácticas de tiro o cómo usar la plataforma. Y si la Secretaría no está conectada, dejame tu consulta en el buzón 📨.`
    : `¡Hola ${user.nombre}! Soy NEXIA ✦ tu copiloto institucional. Puedo consultar la base de datos por vos: preguntame cosas como "¿cuántos aspirantes faltaron hoy?", "¿qué aspirantes tienen bajo rendimiento?" o "¿qué docentes no cargaron asistencia?". También respondo sobre el uso de la plataforma.`;
  const [msgs,setMsgs]=useState([{rol:'ia',texto:bienvenida}]);
  const [texto,setTexto]=useState('');
  const [pensando,setPensando]=useState(false);
  const [buzon,setBuzon]=useState(false);
  const [consulta,setConsulta]=useState('');
  const [escuchando,setEscuchando]=useState(false);
  const recRef=useRef(null);
  const scrollRef=useRef(null);
  const vozSoportada = typeof window!=='undefined' && (window.SpeechRecognition||window.webkitSpeechRecognition);
  const hablar=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ toast('Tu navegador no soporta dictado por voz. Probá con Chrome.'); return; }
    if(escuchando){ recRef.current?.stop(); return; }
    const rec=new SR(); recRef.current=rec;
    rec.lang='es-AR'; rec.interimResults=true; rec.continuous=false;
    let texto_final='';
    rec.onstart=()=>setEscuchando(true);
    rec.onerror=(e)=>{ setEscuchando(false); if(e.error==='not-allowed') toast('Permití el acceso al micrófono para usar el dictado.'); };
    rec.onend=()=>{ setEscuchando(false); if(texto_final.trim()) setTexto(texto_final.trim()); };
    rec.onresult=(e)=>{ let s=''; for(let i=0;i<e.results.length;i++){ s+=e.results[i][0].transcript; } texto_final=s; setTexto(s); };
    rec.start();
  };
  useEffect(()=>{ scrollRef.current?.scrollTo(0,scrollRef.current.scrollHeight); },[msgs,pensando]);
  const enviar=async(t)=>{
    const msg=(t||texto).trim(); if(!msg||pensando) return;
    setMsgs(m=>[...m,{rol:'user',texto:msg}]); setTexto(''); setPensando(true);
    let respuesta=null;
    /* NEXIA opera en Nivel 1 (palabras clave + FAQ entrenadas) y Nivel 2
       (consultas a la base de datos). Para activar IA generativa (Nivel 3)
       en el futuro, conectar aquí un backend (Supabase Edge Function + API). */
    respuesta=respuestaLocalNexia(SEED_DB_REF.current,user,msg);
    setTimeout(()=>{ setMsgs(m=>[...m,{rol:'ia',texto:respuesta}]); setPensando(false); },350);
  };
  const dejarConsulta=()=>{
    if(!consulta.trim()){toast('Escribí tu consulta');return;}
    setDb(d=>({...d, consultasNexia:[...(d.consultasNexia||[]),{id:uid(), autorId:user.id, fecha:hoy(), texto:consulta.trim(), estado:'pendiente', respuesta:''}]}));
    setConsulta(''); setBuzon(false);
    setMsgs(m=>[...m,{rol:'ia',texto:'📨 ¡Listo! Tu consulta quedó en el buzón de la Secretaría Académica. Apenas se conecten te responden; la respuesta la vas a ver en la pestaña "Mis consultas".'}]);
  };
  const sugerencias = user.rol==='aspirante'
    ? ['¿Cómo va mi asistencia?','¿Cómo voy en el polígono de tiro?','¿Hay exámenes para rendir?']
    : user.rol==='admin'
    ? ['¿Cuántos aspirantes faltaron hoy?','¿Qué aspirantes tienen bajo rendimiento?','¿Qué docentes no cargaron asistencia?','Mostrame los comunicados recientes','¿Cuántos aspirantes hay por sección?']
    : ['¿Cómo creo un simulacro?','¿Cuántos aspirantes faltaron hoy?','¿Cómo corrijo entregas?'];
  return (
    <div className="card chat-box">
      <div className="chat-scroll" ref={scrollRef}>
        {msgs.map((m,i)=>(
          <div key={i} className={"chat-msg "+m.rol} style={{whiteSpace:'pre-line'}}>
            {m.rol==='ia'&&<div className="who">✦ NEXIA</div>}
            {m.texto}
          </div>
        ))}
        {pensando&&<div className="chat-msg ia"><div className="who">✦ NEXIA</div>Escribiendo…</div>}
      </div>
      <div className="chat-sug">
        {sugerencias.map(s=><button key={s} onClick={()=>enviar(s)}>{s}</button>)}
        <button onClick={()=>setBuzon(!buzon)} style={{borderColor:'rgba(255,126,95,.4)',color:'var(--amber)',background:'var(--amber-dim)'}}>📨 Dejar consulta a la Secretaría</button>
      </div>
      {buzon && (
        <div style={{display:'flex',gap:8,marginTop:10}}>
          <input value={consulta} onChange={e=>setConsulta(e.target.value)} placeholder="Escribí tu consulta para la Secretaría Académica…" onKeyDown={e=>e.key==='Enter'&&dejarConsulta()}/>
          <button className="btn btn-amber" onClick={dejarConsulta}>Enviar</button>
        </div>
      )}
      <div className="chat-input">
        <input value={texto} onChange={e=>setTexto(e.target.value)} placeholder={escuchando?'Escuchando… hablá ahora':'Escribile a NEXIA…'} onKeyDown={e=>e.key==='Enter'&&enviar()}/>
        {vozSoportada && <button className={"btn mic-btn "+(escuchando?'mic-on':'')} onClick={hablar} title="Hablarle a NEXIA" aria-label="Dictado por voz">{escuchando?'⏹️':'🎤'}</button>}
        <button className="btn btn-primary" style={{width:'auto'}} onClick={()=>enviar()}>➤</button>
      </div>
    </div>
  );
}

function NexiaBuzon({db,setDb,user,toast}){
  const esAdmin = user.rol==='admin';
  const lista = (db.consultasNexia||[]).filter(c=>esAdmin||c.autorId===user.id).sort((a,b)=>(a.estado==='pendiente'?0:1)-(b.estado==='pendiente'?0:1)||b.fecha.localeCompare(a.fecha));
  const [resp,setResp]=useState({});
  const responder=(c)=>{
    const t=(resp[c.id]||'').trim(); if(!t){toast('Escribí la respuesta');return;}
    setDb(d=>({...d, consultasNexia:d.consultasNexia.map(x=>x.id===c.id?{...x,respuesta:t,estado:'respondida',respondioId:user.id}:x)}));
    toast('Respuesta enviada ✓');
  };
  return (
    <div>
      {lista.length===0 && <div className="empty card"><div className="ic">📨</div>{esAdmin?'No hay consultas en el buzón. NEXIA está cubriendo la guardia ✦':'Todavía no dejaste consultas. Podés hacerlo desde el chat con el botón 📨.'}</div>}
      {lista.map(c=>{
        const autor=db.usuarios.find(u=>u.id===c.autorId);
        return (
          <div key={c.id} className="card" style={{marginBottom:12, borderLeft:'3px solid '+(c.estado==='pendiente'?'var(--warn)':'var(--ok)')}}>
            <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
              <div style={{fontSize:12,color:'var(--muted)'}}>{esAdmin?nombreCompleto(autor)+' · ':''}{fmtFecha(c.fecha)}</div>
              <span className={"badge "+(c.estado==='pendiente'?'bg-warn':'bg-ok')}>{c.estado==='pendiente'?'⏳ Pendiente':'✓ Respondida'}</span>
            </div>
            <div style={{fontSize:14,margin:'7px 0'}}>{c.texto}</div>
            {c.respuesta && <div style={{borderLeft:'2px solid var(--amber)',paddingLeft:12,fontSize:13.5}}><span style={{fontSize:11,color:'var(--amber)',fontWeight:700}}>SECRETARÍA ACADÉMICA</span><br/>{c.respuesta}</div>}
            {esAdmin && c.estado==='pendiente' && (
              <div style={{display:'flex',gap:8,marginTop:10}}>
                <input placeholder="Responder…" value={resp[c.id]||''} onChange={e=>setResp({...resp,[c.id]:e.target.value})} onKeyDown={e=>e.key==='Enter'&&responder(c)}/>
                <button className="btn btn-primary btn-sm" onClick={()=>responder(c)}>Responder</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ---------- Polígono de Tiro ---------- */
function Poligono({db,setDb,user,toast}){
  const esDoc = user.rol!=='aspirante';
  const aspirantes = db.usuarios.filter(u=>u.rol==='aspirante'&&u.activo).sort((a,b)=>a.apellido.localeCompare(b.apellido));
  const [form,setForm]=useState({aspiranteId:'',fecha:hoy(),arma:'BERSA TPR9',distancia:7,disparos:15,impactos:0});
  const [filtroAsp,setFiltroAsp]=useState('');
  const registrar=()=>{
    if(!form.aspiranteId){toast('Elegí al aspirante');return;}
    if(Number(form.impactos)>Number(form.disparos)){toast('Los impactos no pueden superar los disparos');return;}
    setDb(d=>({...d, tiroSesiones:[...d.tiroSesiones,{...form, distancia:Number(form.distancia), disparos:Number(form.disparos), impactos:Number(form.impactos), id:uid(), docenteId:user.id}]}));
    setForm({...form, impactos:0}); toast('Práctica registrada 🎯');
  };
  const sesiones = db.tiroSesiones
    .filter(s=> user.rol==='aspirante' ? s.aspiranteId===user.id : (!filtroAsp||s.aspiranteId===filtroAsp))
    .sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const prec=(s)=>Math.round(s.impactos/s.disparos*100);
  const resumen=(aspId)=>{
    const ss=db.tiroSesiones.filter(s=>s.aspiranteId===aspId);
    if(!ss.length) return null;
    return { n:ss.length, prom:Math.round(ss.reduce((a,s)=>a+prec(s),0)/ss.length), mejor:Math.max(...ss.map(prec)), ultima:prec(ss[ss.length-1]) };
  };
  const miRes = user.rol==='aspirante' ? resumen(user.id) : null;
  return (
    <div>
      {user.rol==='aspirante' && miRes && (
        <div className="grid grid-3" style={{marginBottom:16}}>
          <div className="stat"><div className="k">{miRes.prom}%</div><div className="l">Precisión promedio</div></div>
          <div className="stat amber"><div className="k">{miRes.mejor}%</div><div className="l">Mejor marca</div></div>
          <div className="stat ok"><div className="k">{miRes.n}</div><div className="l">Prácticas realizadas</div></div>
        </div>
      )}
      {esDoc && (
        <div className="card" style={{marginBottom:16}}>
          <h4 style={{marginBottom:12}}>Registrar práctica de polígono</h4>
          <div className="grid grid-3">
            <div className="field"><label>Aspirante *</label>
              <select value={form.aspiranteId} onChange={e=>setForm({...form,aspiranteId:e.target.value})}>
                <option value="">Elegir…</option>
                {aspirantes.map(a=><option key={a.id} value={a.id}>{nombreCompleto(a)} · {a.seccion||'—'}</option>)}
              </select></div>
            <div className="field"><label>Fecha</label><input type="date" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}/></div>
            <div className="field"><label>Arma</label>
              <select value={form.arma} onChange={e=>setForm({...form,arma:e.target.value})}>
                <option>BERSA TPR9</option><option>Escopeta</option><option>Carabina</option><option>Otra</option>
              </select></div>
          </div>
          <div className="grid grid-3">
            <div className="field"><label>Distancia (m)</label><input type="number" min="1" value={form.distancia} onChange={e=>setForm({...form,distancia:e.target.value})}/></div>
            <div className="field"><label>Disparos</label><input type="number" min="1" value={form.disparos} onChange={e=>setForm({...form,disparos:e.target.value})}/></div>
            <div className="field"><label>Impactos</label><input type="number" min="0" value={form.impactos} onChange={e=>setForm({...form,impactos:e.target.value})}/></div>
          </div>
          <button className="btn btn-primary btn-sm" onClick={registrar}>Registrar 🎯</button>
        </div>
      )}
      {esDoc && (
        <div className="toolbar">
          <select value={filtroAsp} onChange={e=>setFiltroAsp(e.target.value)}>
            <option value="">Todos los aspirantes</option>
            {aspirantes.map(a=><option key={a.id} value={a.id}>{nombreCompleto(a)}</option>)}
          </select>
          {filtroAsp && (()=>{ const r=resumen(filtroAsp); return r ? <span className="badge bg-violet" style={{alignSelf:'center'}}>Promedio {r.prom}% · Mejor {r.mejor}% · {r.n} prácticas</span> : <span style={{color:'var(--muted)',alignSelf:'center',fontSize:13}}>Sin prácticas registradas</span>; })()}
        </div>
      )}
      {sesiones.length>0 && (
        <div style={{marginBottom:10,textAlign:'right'}}>
          <ExportBtns titulo="Planilla de Polígono de Tiro" toast={toast}
            headers={['Aspirante','Fecha','Arma','Distancia','Disparos','Impactos','Precisión']}
            rows={sesiones.map(s=>[nombreCompleto(db.usuarios.find(u=>u.id===s.aspiranteId)), fmtFecha(s.fecha), s.arma, s.distancia+' m', s.disparos, s.impactos, prec(s)+'%'])}/>
        </div>
      )}
      {sesiones.length===0 && <div className="empty card"><div className="ic">🎯</div>Sin prácticas de tiro registradas todavía.</div>}
      {sesiones.length>0 && (
        <div className="table-wrap"><table>
          <thead><tr>{esDoc&&<th>Aspirante</th>}<th>Fecha</th><th>Arma</th><th>Dist.</th><th>Disparos</th><th>Impactos</th><th>Precisión</th></tr></thead>
          <tbody>{sesiones.map(s=>{
            const p=prec(s);
            return (<tr key={s.id}>
              {esDoc&&<td style={{fontWeight:600}}>{nombreCompleto(db.usuarios.find(u=>u.id===s.aspiranteId))}</td>}
              <td>{fmtFecha(s.fecha)}</td><td>{s.arma}</td><td>{s.distancia} m</td><td>{s.disparos}</td><td>{s.impactos}</td>
              <td style={{minWidth:130}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div className="pbar" style={{flex:1}}><div style={{width:p+'%',background:p>=70?'var(--ok)':p>=50?'var(--warn)':'var(--bad)'}}></div></div>
                  <b style={{fontSize:12.5}}>{p}%</b>
                </div>
              </td>
            </tr>);
          })}</tbody>
        </table></div>
      )}
    </div>
  );
}

/* ---------- Simulacros de Procedimientos ---------- */
function Simulacros({db,setDb,user,toast}){
  const esDoc = user.rol!=='aspirante';
  const [jugando,setJugando]=useState(null);
  const [builder,setBuilder]=useState(false);
  const [verRes,setVerRes]=useState(null);
  if(jugando) return <JugarEscenario db={db} setDb={setDb} user={user} escenario={jugando} onSalir={()=>setJugando(null)}/>;
  if(builder) return <EscenarioBuilder db={db} setDb={setDb} user={user} toast={toast} onSalir={()=>setBuilder(false)}/>;
  return (
    <div>
      {esDoc && <button className="btn btn-primary" style={{marginBottom:14}} onClick={()=>setBuilder(true)}>＋ Crear simulacro</button>}
      {db.escenarios.length===0 && <div className="empty card"><div className="ic">🧩</div>Sin simulacros creados.</div>}
      <div className="grid grid-2">
        {db.escenarios.map(sc=>{
          const intentos = db.escenarioIntentos.filter(i=>i.escenarioId===sc.id);
          const mio = intentos.filter(i=>i.aspiranteId===user.id).sort((a,b)=>b.nota-a.nota)[0];
          return (
            <div key={sc.id} className="card">
              <span className="badge bg-amber">{sc.area}</span>{' '}<span className="badge bg-violet">{sc.pasos.length} decisiones</span>
              <div style={{fontWeight:600,fontSize:15,margin:'8px 0 4px'}}>{sc.titulo}</div>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>{sc.descr}</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                <button className="btn btn-primary btn-sm" onClick={()=>setJugando(sc)}>▶ {user.rol==='aspirante'?'Iniciar simulacro':'Probar simulacro'}</button>
                {user.rol==='aspirante' && mio && <span className={"badge "+(mio.nota>=6?'bg-ok':'bg-bad')}>Tu mejor puntaje: {mio.nota}/10</span>}
                {esDoc && <button className="btn btn-ghost btn-sm" onClick={()=>setVerRes(verRes===sc.id?null:sc.id)}>📊 Resultados ({intentos.length})</button>}
                {user.rol==='admin' && <button className="btn btn-danger btn-sm" onClick={()=>{if(confirm('¿Eliminar simulacro?'))setDb(d=>({...d,escenarios:d.escenarios.filter(x=>x.id!==sc.id)}))}}>✕</button>}
              </div>
              {esDoc && verRes===sc.id && (
                <div style={{marginTop:12,borderTop:'1px solid var(--line)',paddingTop:10}}>
                  {intentos.length===0 && <span style={{fontSize:13,color:'var(--muted)'}}>Nadie lo realizó todavía.</span>}
                  {intentos.sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(i=>(
                    <div key={i.id} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'5px 0',borderBottom:'1px solid var(--line)'}}>
                      <span>{nombreCompleto(db.usuarios.find(u=>u.id===i.aspiranteId))} · <span style={{color:'var(--muted)'}}>{fmtFecha(i.fecha)}</span></span>
                      <span className={"badge "+(i.nota>=6?'bg-ok':'bg-bad')}>{i.correctas}/{i.total} · {i.nota}/10</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function JugarEscenario({db,setDb,user,escenario,onSalir}){
  const [paso,setPaso]=useState(0);
  const [elegida,setElegida]=useState(null);
  const [correctas,setCorrectas]=useState(0);
  const [fin,setFin]=useState(false);
  const p = escenario.pasos[paso];
  const elegir=(i)=>{ if(elegida!==null) return; setElegida(i); if(p.opciones[i].correcta) setCorrectas(c=>c+1); };
  const siguiente=()=>{
    if(paso+1<escenario.pasos.length){ setPaso(paso+1); setElegida(null); }
    else{
      const total=escenario.pasos.length;
      const finalCorrectas = correctas;
      const nota=Math.round(finalCorrectas/total*10*10)/10;
      if(user.rol==='aspirante'){
        setDb(d=>({...d, escenarioIntentos:[...d.escenarioIntentos,{id:uid(), escenarioId:escenario.id, aspiranteId:user.id, fecha:hoy(), correctas:finalCorrectas, total, nota}]}));
      }
      setFin({correctas:finalCorrectas,total,nota});
    }
  };
  if(fin){
    return (
      <div className="card" style={{textAlign:'center',padding:32}}>
        <div style={{fontSize:40,marginBottom:8}}>{fin.nota>=6?'🎖️':'📋'}</div>
        <h3>Simulacro finalizado</h3>
        <p style={{color:'var(--muted)',margin:'8px 0 14px'}}>{escenario.titulo}</p>
        <div className={"badge "+(fin.nota>=6?'bg-ok':'bg-bad')} style={{fontSize:18,padding:'8px 22px'}}>{fin.correctas}/{fin.total} decisiones correctas · {fin.nota}/10</div>
        <p style={{fontSize:13,color:'var(--muted)',margin:'14px 0'}}>{fin.nota>=6?'Buen criterio operativo. La práctica constante consolida el procedimiento.':'Repasá los protocolos con tu docente y volvé a intentarlo: el error en el simulador es aprendizaje, no sanción.'}</p>
        <button className="btn btn-primary" onClick={onSalir}>Volver al Centro de Simulación</button>
      </div>
    );
  }
  return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={onSalir} style={{marginBottom:12}}>‹ Abandonar simulacro</button>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
          <b>{escenario.titulo}</b>
          <span className="badge bg-violet">Decisión {paso+1} de {escenario.pasos.length}</span>
        </div>
        <div className="pbar" style={{marginBottom:16}}><div style={{width:((paso)/escenario.pasos.length*100)+'%',background:'var(--violet)'}}></div></div>
        <div style={{fontSize:14.5,lineHeight:1.65,marginBottom:14,background:'var(--bg)',border:'1px solid var(--line)',borderRadius:12,padding:14}}>📻 {p.situacion}</div>
        {p.opciones.map((o,i)=>{
          let cls='q-opt';
          if(elegida!==null){ if(o.correcta) cls+=' hit'; else if(elegida===i) cls+=' miss'; }
          return <div key={i} className={cls} onClick={()=>elegir(i)}>{String.fromCharCode(65+i)} · {o.texto}</div>;
        })}
        {elegida!==null && (
          <div style={{marginTop:14}}>
            <div style={{fontSize:13.5,padding:12,borderRadius:10,background:p.opciones[elegida].correcta?'var(--ok-dim)':'var(--bad-dim)',color:p.opciones[elegida].correcta?'var(--ok)':'var(--bad)'}}>
              {p.opciones[elegida].correcta?'✓ '+p.feedbackOk:'✕ '+p.feedbackMal}
            </div>
            <div style={{textAlign:'right',marginTop:12}}>
              <button className="btn btn-primary" onClick={siguiente}>{paso+1<escenario.pasos.length?'Siguiente decisión ›':'Ver resultado 🎖️'}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function EscenarioBuilder({db,setDb,user,toast,onSalir}){
  const pasoVacio=()=>({situacion:'',feedbackOk:'',feedbackMal:'',opciones:[{texto:'',correcta:true},{texto:'',correcta:false},{texto:'',correcta:false}]});
  const [sc,setSc]=useState({titulo:'',area:'Procedimientos',descr:'',pasos:[pasoVacio()]});
  const setPaso=(i,np)=>setSc(s=>({...s,pasos:s.pasos.map((p,j)=>j===i?np:p)}));
  const guardar=()=>{
    if(!sc.titulo.trim()){toast('Poné un título al simulacro');return;}
    for(const p of sc.pasos){
      if(!p.situacion.trim()||p.opciones.filter(o=>o.texto.trim()).length<2){toast('Cada decisión necesita situación y al menos 2 opciones');return;}
    }
    const limpio={...sc, pasos:sc.pasos.map(p=>({...p,opciones:p.opciones.filter(o=>o.texto.trim())}))};
    setDb(d=>({...d, escenarios:[...d.escenarios,{...limpio,id:uid(),autorId:user.id}]}));
    toast('Simulacro publicado ✓'); onSalir();
  };
  return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={onSalir} style={{marginBottom:12}}>‹ Volver</button>
      <div className="card" style={{marginBottom:14}}>
        <h4 style={{marginBottom:12}}>Nuevo simulacro de decisión</h4>
        <div className="grid grid-2">
          <div className="field"><label>Título *</label><input value={sc.titulo} onChange={e=>setSc({...sc,titulo:e.target.value})} placeholder="Allanamiento con orden judicial"/></div>
          <div className="field"><label>Área</label>
            <select value={sc.area} onChange={e=>setSc({...sc,area:e.target.value})}>
              <option>Procedimientos</option><option>Defensa Policial</option><option>Bastón Rígido Policial</option><option>Armamento y Tiro</option><option>Primeros Auxilios</option><option>Otra</option>
            </select></div>
        </div>
        <div className="field"><label>Descripción</label><input value={sc.descr} onChange={e=>setSc({...sc,descr:e.target.value})}/></div>
      </div>
      {sc.pasos.map((p,i)=>(
        <div key={i} className="q-card">
          <div className="qn">DECISIÓN {i+1}</div>
          <div className="field"><label>Situación *</label><textarea rows="2" value={p.situacion} onChange={e=>setPaso(i,{...p,situacion:e.target.value})} placeholder="Describí la escena que enfrenta el aspirante…"/></div>
          {p.opciones.map((o,j)=>(
            <div key={j} style={{display:'flex',gap:8,alignItems:'center',marginBottom:7}}>
              <input type="radio" style={{width:'auto'}} name={'ok'+i} checked={o.correcta} title="Marcar como acción correcta"
                onChange={()=>setPaso(i,{...p,opciones:p.opciones.map((x,k)=>({...x,correcta:k===j}))})}/>
              <input value={o.texto} onChange={e=>setPaso(i,{...p,opciones:p.opciones.map((x,k)=>k===j?{...x,texto:e.target.value}:x)})} placeholder={`Opción ${j+1}`}/>
            </div>
          ))}
          <div className="grid grid-2">
            <div className="field"><label>Feedback si acierta</label><input value={p.feedbackOk} onChange={e=>setPaso(i,{...p,feedbackOk:e.target.value})} placeholder="Correcto: …"/></div>
            <div className="field"><label>Feedback si se equivoca</label><input value={p.feedbackMal} onChange={e=>setPaso(i,{...p,feedbackMal:e.target.value})} placeholder="Lo indicado era…"/></div>
          </div>
          {sc.pasos.length>1 && <button className="btn btn-danger btn-sm" onClick={()=>setSc(s=>({...s,pasos:s.pasos.filter((_,k)=>k!==i)}))}>Quitar decisión</button>}
        </div>
      ))}
      <div style={{display:'flex',gap:10,justifyContent:'space-between',marginTop:14,flexWrap:'wrap'}}>
        <button className="btn btn-ghost" onClick={()=>setSc(s=>({...s,pasos:[...s.pasos,pasoVacio()]}))}>＋ Agregar decisión</button>
        <button className="btn btn-primary" onClick={guardar}>Publicar simulacro 🚀</button>
      </div>
    </div>
  );
}


/* =====================  EXPORTACIÓN (CSV · Excel · PDF)  ===================== */
function descargarBlob(nombre, contenido, mime){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([contenido],{type:mime}));
  a.download=nombre; a.click(); URL.revokeObjectURL(a.href);
}
function exportCSV(nombre, headers, rows){
  const esc=(v)=>'"'+String(v??'').replace(/"/g,'""')+'"';
  const csv='\ufeff'+[headers,...rows].map(r=>r.map(esc).join(';')).join('\n');
  descargarBlob(nombre+'.csv', csv, 'text/csv;charset=utf-8');
}
function exportExcel(nombre, headers, rows, toast){
  if(typeof XLSX==='undefined'){ toast&&toast('Excel no disponible sin conexión: descargá CSV'); exportCSV(nombre,headers,rows); return; }
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=headers.map((h,i)=>({wch:Math.max(h.length+2,...rows.map(r=>String(r[i]??'').length+2),10)}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'NEXFOR');
  XLSX.writeFile(wb,nombre+'.xlsx');
}
function exportPDF(titulo, headers, rows){
  const w=window.open('','_blank');
  if(!w){ alert('Permití las ventanas emergentes para descargar el PDF'); return; }
  const filas=rows.map(r=>'<tr>'+r.map(c=>'<td>'+String(c??'').replace(/</g,'&lt;')+'</td>').join('')+'</tr>').join('');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${titulo}</title><style>
    body{font-family:Arial,sans-serif;color:#1A1430;margin:28px}
    .head{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #14B8A6;padding-bottom:10px;margin-bottom:6px}
    .head h1{font-size:20px;margin:0;letter-spacing:.1em}.head h1 span{color:#14B8A6}
    .head .inst{font-size:10px;text-align:right;color:#555;line-height:1.5}
    h2{font-size:15px;margin:14px 0 10px}
    table{width:100%;border-collapse:collapse;font-size:11px}
    th{background:#14B8A6;color:#fff;padding:7px 8px;text-align:left}
    td{padding:6px 8px;border-bottom:1px solid #ddd}
    tr:nth-child(even) td{background:#E6F7F4}
    .foot{margin-top:18px;font-size:9.5px;color:#777;text-align:center;border-top:1px solid #ddd;padding-top:8px}
  </style></head><body>
  <div class="head"><h1>NEX<span>FOR</span></h1><div class="inst">Escuela de Policía de la Provincia del Neuquén<br/>Secretaría Académica · DCFyCCCO<br/>Emitido: ${new Date().toLocaleDateString('es-AR')}</div></div>
  <h2>${titulo}</h2>
  <table><thead><tr>${headers.map(h=>'<th>'+h+'</th>').join('')}</tr></thead><tbody>${filas}</tbody></table>
  <div class="foot">Documento generado por NEXFOR · Desarrollado por la Secretaría Académica MLF&amp;EV · DCFyCCCO</div>
  <script>window.onload=()=>setTimeout(()=>window.print(),300)<\/script></body></html>`);
  w.document.close();
}
function ExportBtns({titulo, headers, rows, toast}){
  if(!rows || !rows.length) return null;
  const nombre = titulo.replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ ]/g,'').replace(/ /g,'_');
  return (
    <span style={{display:'inline-flex',gap:6,flexWrap:'wrap'}}>
      <button className="btn btn-ghost btn-sm" onClick={()=>exportPDF(titulo,headers,rows)}>⬇ PDF</button>
      <button className="btn btn-ghost btn-sm" onClick={()=>exportExcel(nombre,headers,rows,toast)}>⬇ Excel</button>
      <button className="btn btn-ghost btn-sm" onClick={()=>exportCSV(nombre,headers,rows)}>⬇ CSV</button>
    </span>
  );
}

const CATEGORIAS_TRAMITE = ['Planificación','Nota / Oficio','Certificado','Pedido','Examen / Acta','Otro'];
const ESTADOS_TRAMITE = {recibido:{l:'📥 Recibido',c:'bg-info'}, revision:{l:'🔎 En revisión',c:'bg-warn'}, resuelto:{l:'✓ Resuelto',c:'bg-ok'}};
function MesaEntradas({db,setDb,user,toast}){
  const esAdmin = user.rol==='admin';
  const [tabM,setTabM]=useState('mesa');
  const wspNuevos=(db.whatsapp||[]).filter(m=>!m.atendido).length;
  const [form,setForm]=useState({categoria:'Planificación',asunto:'',detalle:'',archivo:null});
  const [filtro,setFiltro]=useState('todos');
  const [resp,setResp]=useState({});
  const lista = db.tramites
    .filter(t=> esAdmin || t.autorId===user.id)
    .filter(t=> filtro==='todos'||t.estado===filtro)
    .sort((a,b)=> b.numero.localeCompare(a.numero));
  const presentar=()=>{
    if(!form.asunto.trim()){toast('Indicá el asunto de tu presentación');return;}
    const anio=new Date().getFullYear();
    const num='NEX-'+anio+'-'+String(db.tramites.length+1).padStart(4,'0');
    setDb(d=>({...d, tramites:[...d.tramites,{...form,id:uid(),numero:num,autorId:user.id,fecha:hoy(),estado:'recibido',respuesta:'',historial:[{fecha:hoy(),texto:'Presentación recibida · N° '+num}]}]}));
    pushNotif(setDb,{titulo:'Nueva presentación en Mesa de Entradas', detalle:num+' · '+form.asunto, icono:'📥', destinoRoles:['admin'], autorId:user.id, vista:'mesa'});
    setForm({categoria:'Planificación',asunto:'',detalle:'',archivo:null});
    toast('📥 Presentación registrada con N° '+num+' · Nada se pierde en NEXFOR');
  };
  const cambiarEstado=(t,estado)=>{
    setDb(d=>({...d, tramites:d.tramites.map(x=>x.id===t.id?{...x,estado,historial:[...x.historial,{fecha:hoy(),texto:'Estado: '+ESTADOS_TRAMITE[estado].l.replace(/^[^ ]+ /,'')}]}:x)}));
  };
  const responder=(t)=>{
    const txt=(resp[t.id]||'').trim(); if(!txt){toast('Escribí la respuesta');return;}
    setDb(d=>({...d, tramites:d.tramites.map(x=>x.id===t.id?{...x,respuesta:txt,estado:'resuelto',historial:[...x.historial,{fecha:hoy(),texto:'Respondido por Secretaría Académica'}]}:x)}));
    toast('Trámite resuelto ✓');

      {lista.map(t=>{
        const autor=db.usuarios.find(u=>u.id===t.autorId);
        const est=ESTADOS_TRAMITE[t.estado];
        return (
          <div key={t.id} className="card" style={{marginBottom:12,borderLeft:'3px solid '+(t.estado==='recibido'?'var(--info)':t.estado==='revision'?'var(--warn)':'var(--ok)')}}>

                <span className="badge bg-amber">{t.categoria}</span>{' '}

                {t.archivo && <div><FileChip archivo={t.archivo}/></div>}
                {t.respuesta && <div style={{borderLeft:'2px solid var(--amber)',paddingLeft:12,marginTop:8,fontSize:13.5}}><span style={{fontSize:11,color:'var(--amber)',fontWeight:700}}>RESPUESTA DE SECRETARÍA</span><br/>{t.respuesta}</div>}
              </div>
              {esAdmin && (
                <div style={{display:'flex',flexDirection:'column',gap:6,minWidth:160}}>
                  {t.estado!=='resuelto' && <>
                    {t.estado==='recibido' && <button className="btn btn-ghost btn-sm" onClick={()=>cambiarEstado(t,'revision')}>🔎 Pasar a revisión</button>}

                    <button className="btn btn-primary btn-sm" onClick={()=>responder(t)}>Resolver ✓</button>
                  </>}
                </div>
              )}
            </div>
            <details style={{marginTop:8}}>
              <summary style={{fontSize:11.5,color:'var(--muted)',cursor:'pointer'}}>Historial del trámite</summary>
              {t.historial.map((h,i)=><div key={i} style={{fontSize:12,color:'var(--muted)',padding:'3px 0 0 12px'}}>· {fmtFecha(h.fecha)} — {h.texto}</div>)}
            </details>
          </div>
        );
      })}
      </>}
    </div>
  );
}

/* =====================  LEGAJO DIGITAL DEL ASPIRANTE  ===================== */
function calcularInsignias(db,asp){
  const out=[];
  const asist=pctAsistencia(db,asp.id,null);
  if(asist!==null && asist>=95) out.push({ic:'🗓️',n:'Presentismo Ejemplar',d:'Asistencia ≥ 95%'});
  const cals=db.calificaciones.filter(c=>c.aspiranteId===asp.id);
  const notas=cals.flatMap(c=>['parcial1','parcial2','tp','final'].map(k=>c[k]).filter(n=>n!=null));
  const prom=notas.length?notas.reduce((a,b)=>a+b,0)/notas.length:null;
  if(prom!==null && prom>=8) out.push({ic:'📊',n:'Cuadro de Honor',d:'Promedio general ≥ 8'});
  const tiros=db.tiroSesiones.filter(s=>s.aspiranteId===asp.id);
  if(tiros.length){
    const pTiro=tiros.reduce((a,s)=>a+s.impactos/s.disparos*100,0)/tiros.length;
    if(pTiro>=75) out.push({ic:'🎯',n:'Tirador Destacado',d:'Precisión promedio ≥ 75%'});
  }
  if(db.escenarioIntentos.some(i=>i.aspiranteId===asp.id && i.nota===10)) out.push({ic:'🧩',n:'Criterio Operativo',d:'Simulacro perfecto 10/10'});
  return {insignias:out, asist, prom: prom!==null?Math.round(prom*10)/10:null};
}

  const pTiro=tiros.length?Math.round(tiros.reduce((a,s)=>a+s.impactos/s.disparos*100,0)/tiros.length):null;
  const sims=db.escenarioIntentos.filter(i=>i.aspiranteId===asp.id);
  const entregas=db.entregas.filter(e=>e.aspiranteId===asp.id);
  const cond=conductaAsp(db,asp.id);
  const nivelC=NIVEL_CONDUCTA(cond.puntaje);

function analizarTrabajoIA(texto, material){
  const limpiar=t=>t.toLowerCase().replace(/[^a-záéíóúñü0-9\s]/gi,' ');
  const palabras=limpiar(texto).split(/\s+/).filter(Boolean);
  const oraciones=texto.split(/[.!?\n]+/).map(s=>s.trim()).filter(s=>s.split(/\s+/).length>=4);
  if(palabras.length<60) return {error:'El texto es muy corto para un análisis confiable (mínimo ~60 palabras). Pegá el trabajo completo.'};
  const tl=' '+texto.toLowerCase()+' ';
  const señales=[]; let riesgo=0;
  /* 1) Conectores formulaicos típicos de IA */
  const conectores=['en primer lugar','en segundo lugar','en tercer lugar','en conclusión','cabe destacar','es importante destacar','es importante mencionar','es fundamental','por otro lado','por otra parte','asimismo','en resumen','no obstante','en este sentido','en el ámbito','juega un papel','desempeña un papel','a lo largo de','en la actualidad','de esta manera','por consiguiente','en definitiva','adicionalmente'];
  const nCon=conectores.reduce((a,c)=>a+(tl.split(c).length-1),0);
  const pCon=Math.min(30,Math.round(nCon/(palabras.length/100)*12));
  riesgo+=pCon; señales.push({n:'Conectores formulaicos típicos de IA',v:nCon+' detectado(s)',p:pCon,max:30});
  /* 2) Oraciones largas y de longitud muy uniforme */
  let pUni=0, avgTxt='—';
  if(oraciones.length>=4){
    const lens=oraciones.map(s=>s.split(/\s+/).length);
    const avg=lens.reduce((a,b)=>a+b,0)/lens.length;
    const sd=Math.sqrt(lens.reduce((a,b)=>a+Math.pow(b-avg,2),0)/lens.length);
    const cv=sd/avg; avgTxt='promedio '+Math.round(avg)+' palabras/oración';
    if(avg>=17&&cv<0.45) pUni=25; else if(avg>=14&&cv<0.55) pUni=15; else if(cv<0.35) pUni=10;
  }
  riesgo+=pUni; señales.push({n:'Oraciones largas de longitud muy pareja',v:avgTxt,p:pUni,max:25});
  /* 3) Ausencia de voz personal y marcas regionales */
  const personales=[' yo ',' me parece','creo que','pienso que',' mi profe',' nuestra escuela','tenés','podés','hacé','mirá',' acá ',' che ','o sea',' osea ',' re '];
  const nPers=personales.reduce((a,c)=>a+(tl.split(c).length-1),0);
  const pVoz=nPers===0?20:nPers===1?10:0;
  riesgo+=pVoz; señales.push({n:'Sin voz personal ni marcas regionales argentinas',v:nPers+' marca(s) personal(es)',p:pVoz,max:20});
  /* 4) Vocabulario genérico/abstracto */
  const genericos=['implementación','optimizar','metodología','paradigma','holístico','sinergia','multidimensional','exhaustivo','primordial','intrínseco','transversal','potenciar'];
  const nGen=genericos.reduce((a,c)=>a+(tl.split(c).length-1),0);
  const pGen=Math.min(15,nGen*4);
  riesgo+=pGen; señales.push({n:'Vocabulario genérico/abstracto de manual',v:nGen+' término(s)',p:pGen,max:15});
  /* 5) Estructura en listas perfectamente numeradas */
  const nBul=(texto.match(/^\s*([-•*]|\d+[.)])\s/gm)||[]).length;
  const pBul=nBul>=5?10:nBul>=3?5:0;
  riesgo+=pBul; señales.push({n:'Estructura en viñetas/numeración perfecta',v:nBul+' ítem(s)',p:pBul,max:10});
  riesgo=Math.min(100,riesgo);
  /* Uso del material de la cátedra */
  let usoMaterial=null, terminosUsados=[], claves=[];
  if(material&&material.trim().length>80){
    const stop=new Set(['sobre','entre','desde','hasta','cuando','donde','porque','aunque','mediante','dentro','contra','durante','también','según','través','cada','para','como','este','esta','estos','estas','será','puede','deben','debe','hacer','tiene','tienen','siendo','luego','antes','ahora','mismo','misma','otros','otras','todos','todas','parte','forma','manera','caso']);
    const matP=limpiar(material).split(/\s+/).filter(w=>w.length>=5&&!stop.has(w));
    const freq={}; matP.forEach(w=>freq[w]=(freq[w]||0)+1);
    claves=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,25).map(e=>e[0]);
    const setT=new Set(palabras);
    terminosUsados=claves.filter(c=>setT.has(c));
    usoMaterial=claves.length?Math.round(terminosUsados.length/claves.length*100):null;
  }
  const veredicto = riesgo>=65?{t:'⚠ Alta presencia de señales de redacción con IA',c:'bad',d:'Recomendación: citar al aspirante a coloquio oral para que defienda el trabajo con sus palabras.'}
    : riesgo>=35?{t:'🔎 Señales mixtas',c:'warn',d:'Puede haber asistencia parcial de IA. Conviene repreguntar conceptos clave en clase.'}
    :{t:'✓ Predominio de redacción personal',c:'ok',d:'El texto presenta características compatibles con redacción propia del aspirante.'};
  return {riesgo,señales,usoMaterial,terminosUsados,claves,veredicto,nPalabras:palabras.length};
}

function NexiaScan({toast}){

    if(!trabajo.trim()){toast('Pegá el texto del trabajo a analizar');return;}
    const r=analizarTrabajoIA(trabajo,material);
    if(r.error){toast(r.error);return;}
    setRes(r);
  };

            <div style={{marginTop:16,padding:14,background:'var(--bg)',border:'1px solid var(--line)',borderRadius:12}}>

              </div>
              <div className="pbar" style={{marginBottom:8}}><div style={{width:res.usoMaterial+'%',background:res.usoMaterial>=50?'var(--ok)':res.usoMaterial>=25?'var(--warn)':'var(--bad)'}}></div></div>

function LineChart({points, color='var(--violet)', h=160}){
  const w=520, pad=30;
  if(points.length===0) return <div className="empty"><div className="ic">📈</div>Sin datos suficientes.</div>;
  const max=Math.max(100,...points.map(p=>p.v));
  const min=0;
  const stepX=(w-pad*2)/Math.max(1,points.length-1);
  const px=(i)=>pad+i*stepX;
  const py=(v)=>h-pad-((v-min)/(max-min))*(h-pad*2);
  const d=points.map((p,i)=>(i===0?'M':'L')+px(i)+' '+py(p.v)).join(' ');
  const area=d+` L ${px(points.length-1)} ${h-pad} L ${px(0)} ${h-pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%'}}>
      <defs><linearGradient id="lc-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity=".28"/><stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      {[0,25,50,75,100].map(g=>(<line key={g} x1={pad} y1={py(g)} x2={w-pad} y2={py(g)} stroke="var(--line)" strokeWidth="1" strokeDasharray="3 4"/>))}
      <path d={area} fill="url(#lc-grad)"/>
      <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {points.map((p,i)=>(<g key={i}><circle cx={px(i)} cy={py(p.v)} r="4" fill={color}/>
        <text x={px(i)} y={h-8} textAnchor="middle" fontSize="10" fill="var(--muted)">{p.label}</text>
        <text x={px(i)} y={py(p.v)-9} textAnchor="middle" fontSize="10" fill="var(--text)" fontWeight="600">{p.v}%</text></g>))}
    </svg>
  );
}

  const aspirantes = db.usuarios.filter(u=>u.rol==='aspirante'&&u.activo);
  // rendimiento por materia
  const rendMateria = db.materias.map(m=>{
    const cs=db.calificaciones.filter(c=>c.materiaId===m.id);
    const notas=cs.flatMap(c=>['parcial1','parcial2','tp','final'].map(k=>c[k]).filter(n=>n!=null));
    return {label:m.nombre, v:notas.length?notas.reduce((a,b)=>a+b,0)/notas.length:null, color:m.color};
  }).filter(x=>x.v!=null).sort((a,b)=>b.v-a.v);
  // asistencia general
  const asisGen=(()=>{ const r=db.asistencias; if(!r.length) return null; const p=r.filter(a=>a.estado==='P'||a.estado==='T'||a.estado==='J').length; return Math.round(p/r.length*100); })();
  // asistencia por sección
  const asisSeccion = SECCIONES.map(sec=>{
    const ids=aspirantes.filter(a=>a.seccion===sec).map(a=>a.id);
    const regs=db.asistencias.filter(a=>ids.includes(a.aspiranteId));
    const v=regs.length?Math.round(regs.filter(a=>a.estado==='P'||a.estado==='T'||a.estado==='J').length/regs.length*100):null;
    return {label:sec.replace('Sección','Sec.'), v, color:'var(--cyan)'};
  }).filter(x=>x.v!=null);
  // promedio general
  const promedios=aspirantes.map(a=>promedioAsp(db,a.id)).filter(p=>p!=null);
  const promGen=promedios.length?(promedios.reduce((a,b)=>a+b,0)/promedios.length):null;
  // distribución de notas
  const aprob=promedios.filter(p=>p>=6).length, regular=promedios.filter(p=>p>=4&&p<6).length, desap=promedios.filter(p=>p<4).length;
  // evolución mensual de asistencia (por mes con registros)
  const porMes={};
  db.asistencias.forEach(a=>{ const mes=a.fecha.slice(0,7); if(!porMes[mes])porMes[mes]={ok:0,t:0}; porMes[mes].t++; if(a.estado==='P'||a.estado==='T'||a.estado==='J')porMes[mes].ok++; });
  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const evol=Object.keys(porMes).sort().slice(-6).map(k=>({label:meses[parseInt(k.slice(5,7))-1], v:Math.round(porMes[k].ok/porMes[k].t*100)}));
  // ranking de mérito
  const ranking=aspirantes.map(a=>({a, prom:promedioAsp(db,a.id), asis:pctAsistencia(db,a.id,null)}))
    .filter(x=>x.prom!=null).sort((a,b)=>b.prom-a.prom).slice(0,8);

  // alertas predictivas detalladas
  const alertas=[];
  asisSeccion.forEach(s=>{ if(s.v<70) alertas.push({tipo:'bad',ic:'⚠️',txt:`${s.label} con asistencia crítica (${s.v}%)`}); });
  aspirantes.forEach(a=>{ const p=promedioAsp(db,a.id); if(p!=null&&p<4) alertas.push({tipo:'bad',ic:'📉',txt:`${nombreCompleto(a)} en riesgo académico (promedio ${Math.round(p*10)/10})`}); });
  aspirantes.forEach(a=>{ const pc=pctAsistencia(db,a.id,null); if(pc!=null&&pc<60) alertas.push({tipo:'warn',ic:'🚫',txt:`${nombreCompleto(a)} con ausentismo elevado (${pc}% asistencia)`}); });
  db.usuarios.filter(u=>u.rol==='docente'&&u.activo).forEach(d=>{ if(!db.libroTemas.some(t=>t.docenteId===d.id)) alertas.push({tipo:'warn',ic:'📖',txt:`${nombreCompleto(d)} no cargó clases en el Libro de Temas`}); });

  return (
    <div>
      <div className="page-head">
        <div><h3>📈 Inteligencia Institucional</h3><p>Analítica académica, indicadores y alertas predictivas en tiempo real.</p></div>
        <ExportBtns titulo="Inteligencia Institucional · Rendimiento por materia" toast={toast}
          headers={['Materia','Promedio']} rows={rendMateria.map(r=>[r.label, Math.round(r.v*10)/10])}/>
      </div>

      {/* indicadores rápidos */}
      <div className="cmd-grid" style={{marginBottom:8}}>
        <Kpi ic="👥" val={aspirantes.length} lbl="Aspirantes activos" tone="tech"/>
        <Kpi ic="📈" val={asisGen===null?'—':asisGen+'%'} lbl="Asistencia general" tone={asisGen===null?'cyan':asisGen>=80?'ok':'bad'}/>
        <Kpi ic="🎯" val={promGen===null?'—':(Math.round(promGen*10)/10)} lbl="Promedio general" tone={promGen===null?'cyan':promGen>=6?'ok':'amber'}/>
        <Kpi ic="⚠️" val={alertas.length} lbl="Alertas activas" tone={alertas.length>0?'bad':'ok'}/>
      </div>

      {/* alertas predictivas */}
      <div className="cmd-section-title">⚡ Sistema predictivo · Alertas</div>
      {alertas.length===0
        ? <div className="card" style={{marginBottom:14}}><div style={{color:'var(--ok)',fontSize:13.5}}>✓ Sin alertas. Todos los indicadores en rango normal.</div></div>
        : <div className="card" style={{marginBottom:14}}>{alertas.slice(0,12).map((a,i)=>(<div key={i} className={"alert-chip "+a.tipo}><span className="a-ic">{a.ic}</span><span>{a.txt}</span></div>))}{alertas.length>12&&<div style={{fontSize:12,color:'var(--muted)',marginTop:6}}>+{alertas.length-12} alertas más…</div>}</div>}

      <div className="grid grid-2">
        <div className="card">
          <h4 style={{marginBottom:14}}>📊 Rendimiento por materia</h4>
          <BarChart data={rendMateria} max={10}/>
        </div>
        <div className="card">
          <h4 style={{marginBottom:14}}>🎯 Distribución académica</h4>
          <div style={{display:'flex',justifyContent:'center',marginBottom:10}}><Donut pct={promedios.length?Math.round(aprob/promedios.length*100):null} label="aprobados" color="var(--ok)"/></div>
          <div style={{display:'flex',justifyContent:'space-around',fontSize:12.5,textAlign:'center'}}>
            <div><div style={{fontWeight:700,color:'var(--ok)',fontSize:18}}>{aprob}</div>Aprobados (≥6)</div>
            <div><div style={{fontWeight:700,color:'var(--warn)',fontSize:18}}>{regular}</div>Regulares (4-5)</div>
            <div><div style={{fontWeight:700,color:'var(--bad)',fontSize:18}}>{desap}</div>En riesgo (&lt;4)</div>
          </div>
        </div>
      </div>

      <div className="grid grid-2" style={{marginTop:14}}>
        <div className="card">
          <h4 style={{marginBottom:14}}>🏫 Asistencia por sección</h4>
          <BarChart data={asisSeccion} max={100} unidad="%" color="var(--cyan)"/>
        </div>
        <div className="card">
          <h4 style={{marginBottom:14}}>📈 Evolución mensual de asistencia</h4>
          <LineChart points={evol} color="var(--violet)"/>
        </div>
      </div>

      <div className="card" style={{marginTop:14}}>
        <h4 style={{marginBottom:12}}>🏆 Ranking de mérito (Top 8)</h4>
        {ranking.length===0 && <div className="empty"><div className="ic">🏅</div>Sin calificaciones cargadas todavía.</div>}
        {ranking.length>0 && <div className="table-wrap"><table>
          <thead><tr><th>#</th><th>Aspirante</th><th>Sección</th><th>Promedio</th><th>Asistencia</th></tr></thead>
          <tbody>{ranking.map((x,i)=>(
            <tr key={x.a.id}>
              <td style={{fontWeight:700,color:i<3?'var(--amber)':'var(--muted)'}}>{i+1}</td>
              <td style={{fontWeight:600}}>{nombreCompleto(x.a)}</td>
              <td>{x.a.seccion||'—'}</td>
              <td><span className={"badge "+(x.prom>=6?'bg-ok':x.prom>=4?'bg-warn':'bg-bad')}>{Math.round(x.prom*10)/10}</span></td>
              <td>{x.asis==null?'—':x.asis+'%'}</td>
            </tr>
          ))}</tbody>
        </table></div>}
      </div>
    </div>
  );
}

  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${titulo}</title><style>
    body{font-family:Arial,sans-serif;color:#1A1430;margin:34px;line-height:1.6}
    .head{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #04A293;padding-bottom:10px;margin-bottom:14px}
