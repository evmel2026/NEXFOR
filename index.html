    .head .inst{font-size:10px;text-align:right;color:#555;line-height:1.5}
    h2{font-size:16px;margin:6px 0 14px;text-transform:uppercase;letter-spacing:.04em}
    .meta{font-size:11px;color:#555;margin-bottom:16px;border-left:3px solid #04A293;padding-left:10px}
    .cuerpo{font-size:13px;text-align:justify;white-space:pre-line;margin-bottom:40px}
    .firma{margin-top:50px;text-align:center;font-size:12px}
    .firma .linea{width:230px;border-top:1px solid #333;margin:0 auto 5px}
    .sello{margin-top:26px;font-size:10px;color:#04736A;text-align:center;border:1px dashed #04A293;border-radius:8px;padding:8px;background:#F0FBF9}
    .foot{margin-top:24px;font-size:9.5px;color:#777;text-align:center;border-top:1px solid #ddd;padding-top:8px}
  </style></head><body>
  <div class="head"><h1>NEX<span>FOR</span></h1><div class="inst">Escuela de Policía de la Provincia del Neuquén<br/>Secretaría Académica · DCFyCCCO<br/>Emitido: ${new Date().toLocaleDateString('es-AR')}</div></div>
  <h2>${titulo}</h2>
  <div class="cuerpo">${cuerpoHTML}</div>
  <div class="firma"><div class="linea"></div>${firmante||''}</div>
  ${selloHTML}
  <div class="foot">Documento generado por NEXFOR · Secretaría Académica MLF&amp;EV · DCFyCCCO</div>
  <script>window.onload=()=>setTimeout(()=>window.print(),300)<\/script></body></html>`);
  w.document.close();
}

const TIPOS_INFORME = {
  aspirante:  {l:'Novedad sobre un aspirante', ic:'👤'},
  contenidos: {l:'Contenidos no dictados / atraso de programa', ic:'📚'},
  seccion:    {l:'Novedad general del curso / sección', ic:'🏫'},
  incidente:  {l:'Incidente o situación particular', ic:'⚠️'},
};

function Informes({db,setDb,user,toast}){
  const [modal,setModal]=useState(null);
  const aspirantes=db.usuarios.filter(u=>u.rol==='aspirante'&&u.activo).sort((a,b)=>a.apellido.localeCompare(b.apellido));
  const misMaterias = user.rol==='docente' ? materiasDeDocente(db,user.id) : db.materias;
  const mios = (db.informes||[]).filter(i=> user.rol==='admin' ? true : i.autorId===user.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const nuevo=(tipo)=>setModal({tipo, fecha:hoy(), aspiranteId:'', materiaId:misMaterias[0]?.id||'', seccion:'Sección 1', asunto:'', detalle:''});

  const armarCuerpo=(inf)=>{
    const docente=db.usuarios.find(u=>u.id===inf.autorId)||user;
    const fecha=fmtFecha(inf.fecha);
    if(inf.tipo==='aspirante'){
      const a=db.usuarios.find(u=>u.id===inf.aspiranteId);
      return `En la fecha ${fecha}, quien suscribe ${nombreCompleto(docente)} eleva el presente informe respecto del/de la aspirante ${a?nombreCompleto(a):'—'}${a?.seccion?(', '+a.seccion):''}${a?.dni?(', DNI '+a.dni):''}.\n\nAsunto: ${inf.asunto}\n\n${inf.detalle}\n\nSe eleva a la Secretaría Académica para su conocimiento y efectos que correspondan.`;
    }
    if(inf.tipo==='contenidos'){
      const m=db.materias.find(x=>x.id===inf.materiaId);
      return `En la fecha ${fecha}, quien suscribe ${nombreCompleto(docente)}, a cargo de la materia ${m?.nombre||'—'}${inf.seccion?(' · '+inf.seccion):''}, informa sobre el estado de avance del programa.\n\nAsunto: ${inf.asunto}\n\nContenidos no dictados / observaciones de avance:\n${inf.detalle}\n\nSe deja constancia para su registro y reprogramación si correspondiere.`;
    }
    if(inf.tipo==='seccion'){
      return `En la fecha ${fecha}, quien suscribe ${nombreCompleto(docente)} eleva novedad general correspondiente a ${inf.seccion}.\n\nAsunto: ${inf.asunto}\n\n${inf.detalle}\n\nSe eleva a la Secretaría Académica para su conocimiento.`;
    }
    return `En la fecha ${fecha}, quien suscribe ${nombreCompleto(docente)} informa sobre el siguiente hecho/situación particular.\n\nAsunto: ${inf.asunto}\n\n${inf.detalle}\n\nSe eleva el presente a fin de dejar debida constancia.`;
  };

  const guardar=()=>{
    if(!modal.asunto.trim()||!modal.detalle.trim()){toast('Completá asunto y detalle');return;}
    if(modal.tipo==='aspirante'&&!modal.aspiranteId){toast('Elegí el aspirante');return;}
    const sello=generarSello(user.id+'|'+modal.tipo+'|'+modal.asunto+'|'+modal.detalle);
    const inf={...modal, id:uid(), autorId:user.id, selloTs:sello.ts, selloCod:sello.cod};
    setDb(d=>({...d, informes:[...(d.informes||[]), inf]}));
    pushNotif(setDb,{titulo:'Nuevo informe: '+TIPOS_INFORME[modal.tipo].l, detalle:modal.asunto, icono:'📄', destinoRoles:['admin'], autorId:user.id, vista:'informes'});
    setModal(null); toast('Informe generado ✓');
  };
  const eliminar=(id)=>{ if(confirm('¿Eliminar este informe?')) setDb(d=>({...d,informes:d.informes.filter(i=>i.id!==id)})); };
  const descargar=(inf)=>{
    exportInformePDF('Informe · '+TIPOS_INFORME[inf.tipo].l, armarCuerpo(inf).replace(/</g,'&lt;'), nombreCompleto(db.usuarios.find(u=>u.id===inf.autorId)||user), inf.selloCod?{cod:inf.selloCod,ts:inf.selloTs}:null);
  };

  return (
    <div>
      <div className="page-head">
        <div><h3>📄 Informes</h3><p>Copiloto administrativo: generá informes formales que se autocompletan y se descargan en PDF con membrete.</p></div>
      </div>
      <div className="cmd-section-title">✦ Generar nuevo informe</div>
      <div className="grid grid-4" style={{marginBottom:18}}>
        {Object.entries(TIPOS_INFORME).map(([k,v])=>(
          <button key={k} className="kpi" style={{cursor:'pointer',textAlign:'left',color:'var(--text)'}} onClick={()=>nuevo(k)}>
            <div className="kpi-top"><div className="kpi-ic">{v.ic}</div><span style={{fontSize:18,color:'var(--violet)'}}>＋</span></div>
            <div style={{fontSize:13.5,fontWeight:600,lineHeight:1.3,color:'var(--text)'}}>{v.l}</div>
          </button>
        ))}
      </div>

      <div className="cmd-section-title">🗂️ Informes generados</div>
      {mios.length===0 && <div className="empty card"><div className="ic">📄</div>Todavía no generaste informes. Elegí un tipo arriba para crear el primero.</div>}
      {mios.map(inf=>{
        const autor=db.usuarios.find(u=>u.id===inf.autorId);
        return (
          <div key={inf.id} className="card" style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',gap:10,flexWrap:'wrap',alignItems:'flex-start'}}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <span className="badge bg-violet">{TIPOS_INFORME[inf.tipo].ic} {TIPOS_INFORME[inf.tipo].l}</span>
                </div>
                <div style={{fontWeight:600,fontSize:15}}>{inf.asunto}</div>
                <div style={{fontSize:12.5,color:'var(--muted)',margin:'3px 0'}}>{fmtFecha(inf.fecha)} · {nombreCompleto(autor)}</div>
                <div style={{fontSize:13,whiteSpace:'pre-line',marginTop:6}}>{inf.detalle.slice(0,260)}{inf.detalle.length>260?'…':''}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                <button className="btn btn-amber btn-sm" onClick={()=>descargar(inf)}>⬇ PDF</button>
                {(user.rol==='admin'||inf.autorId===user.id) && <button className="btn btn-danger btn-sm" onClick={()=>eliminar(inf.id)}>Eliminar</button>}
              </div>
            </div>
          </div>
        );
      })}

      {modal && (
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <h3>{TIPOS_INFORME[modal.tipo].ic} {TIPOS_INFORME[modal.tipo].l}</h3>
            <div className="grid grid-2">
              <div className="field"><label>Fecha</label><input type="date" value={modal.fecha} onChange={e=>setModal({...modal,fecha:e.target.value})}/></div>
              {modal.tipo==='aspirante' && <div className="field"><label>Aspirante *</label>
                <select value={modal.aspiranteId} onChange={e=>setModal({...modal,aspiranteId:e.target.value})}>
                  <option value="">Elegir…</option>
                  {aspirantes.map(a=><option key={a.id} value={a.id}>{nombreCompleto(a)} · {a.seccion||'—'}</option>)}
                </select></div>}
              {modal.tipo==='contenidos' && <div className="field"><label>Materia</label>
                <select value={modal.materiaId} onChange={e=>setModal({...modal,materiaId:e.target.value})}>
                  {misMaterias.map(m=><option key={m.id} value={m.id}>{m.nombre}</option>)}
                </select></div>}
              {(modal.tipo==='seccion'||modal.tipo==='contenidos') && <div className="field"><label>Sección</label>
                <select value={modal.seccion} onChange={e=>setModal({...modal,seccion:e.target.value})}>
                  {SECCIONES.map(s=><option key={s}>{s}</option>)}
                </select></div>}
            </div>
            <div className="field"><label>Asunto *</label><input value={modal.asunto} onChange={e=>setModal({...modal,asunto:e.target.value})} placeholder="Síntesis del informe"/></div>
            <div className="field"><label>Detalle / cuerpo *</label><textarea rows="5" value={modal.detalle} onChange={e=>setModal({...modal,detalle:e.target.value})} placeholder="Redactá la novedad. NEXFOR le da el formato institucional automáticamente."/></div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:6}}>📄 Se generará un documento con membrete, encabezado formal y espacio de firma, listo para descargar en PDF.</div>
            <div className="modal-foot">
              <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn btn-primary" onClick={guardar}>Generar informe</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Novedades({db,setDb,user,toast}){
  const [texto,setTexto]=useState('');
  const [seccion,setSeccion]=useState('General');
  const novs=[...(db.novedades||[])].sort((a,b)=> b.fecha.localeCompare(a.fecha) || b.ts-a.ts);
  // agrupar por fecha
  const grupos={};
  novs.forEach(n=>{ (grupos[n.fecha]=grupos[n.fecha]||[]).push(n); });
  const fechas=Object.keys(grupos).sort((a,b)=>b.localeCompare(a));

  const publicar=()=>{
    if(!texto.trim()){toast('Escribí la novedad');return;}
    setDb(d=>({...d, novedades:[...(d.novedades||[]),{id:uid(), autorId:user.id, fecha:hoy(), ts:Date.now(), seccion, texto:texto.trim()}]}));
    pushNotif(setDb,{titulo:'Nueva novedad en bitácora', detalle:(seccion!=='General'?seccion+' · ':'')+texto.slice(0,60), icono:'🗒️', destinoRoles:['admin'], autorId:user.id, vista:'novedades'});
    setTexto(''); toast('Novedad registrada ✓');
  };
  const eliminar=(id)=>{ if(confirm('¿Eliminar esta novedad?')) setDb(d=>({...d,novedades:d.novedades.filter(n=>n.id!==id)})); };

  return (
    <div>
      <div className="page-head">
        <div><h3>🗒️ Novedades</h3><p>Bitácora diaria de la Escuela: anotá el día a día, ordenado por fecha.</p></div>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <div className="field"><label>Nueva entrada de bitácora</label>
          <textarea rows="3" value={texto} onChange={e=>setTexto(e.target.value)} placeholder="¿Qué novedad querés registrar hoy?"/>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end'}}>
          <div className="field" style={{flex:1,minWidth:160,marginBottom:0}}><label>Referencia</label>
            <select value={seccion} onChange={e=>setSeccion(e.target.value)}>
              <option>General</option>
              {SECCIONES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <button className="btn btn-primary" style={{width:'auto'}} onClick={publicar}>Registrar novedad</button>
        </div>
      </div>

      {fechas.length===0 && <div className="empty card"><div className="ic">🗒️</div>Sin novedades registradas todavía.</div>}
      {fechas.map(f=>(
        <div key={f} style={{marginBottom:18}}>
          <div className="cmd-section-title">📅 {fmtFecha(f)}</div>
          {grupos[f].map(n=>{
            const autor=db.usuarios.find(u=>u.id===n.autorId);
            return (
              <div key={n.id} className="card" style={{marginBottom:8,padding:'13px 16px'}}>
                <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start'}}>
                  <div style={{flex:1}}>
                    {n.seccion&&n.seccion!=='General'&&<span className="badge bg-info" style={{marginRight:8,fontSize:11}}>{n.seccion}</span>}
                    <span style={{fontSize:14}}>{n.texto}</span>
                    <div style={{fontSize:11.5,color:'var(--muted)',marginTop:5}}>{nombreCompleto(autor)}</div>
                  </div>
                  {(user.rol==='admin'||n.autorId===user.id) && <button className="btn btn-danger btn-sm" onClick={()=>eliminar(n.id)}>✕</button>}
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

function Campana({db,setDb,user,go}){
  const [abierto,setAbierto]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    const h=(e)=>{ if(ref.current && !ref.current.contains(e.target)) setAbierto(false); };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[]);
  const mias = (db.notificaciones||[]).filter(n=>
    (n.destinoRoles||[]).includes(user.rol) && n.autorId!==user.id
  );
  const noLeidas = mias.filter(n=>!(n.leidaPor||[]).includes(user.id));
  const marcarTodas=()=>{
    setDb(d=>({...d, notificaciones:(d.notificaciones||[]).map(n=>
      (n.destinoRoles||[]).includes(user.rol) && n.autorId!==user.id && !(n.leidaPor||[]).includes(user.id)
        ? {...n, leidaPor:[...(n.leidaPor||[]), user.id]} : n
    )}));
  };
  const abrirNotif=(n)=>{
    setDb(d=>({...d, notificaciones:(d.notificaciones||[]).map(x=>x.id===n.id?{...x,leidaPor:[...new Set([...(x.leidaPor||[]),user.id])]}:x)}));
    if(n.vista){ go(n.vista); }
    setAbierto(false);
  };
  const tiempo=(iso)=>{
    const diff=(Date.now()-new Date(iso).getTime())/1000;
    if(diff<60) return 'recién';
    if(diff<3600) return Math.floor(diff/60)+' min';
    if(diff<86400) return Math.floor(diff/3600)+' h';
    return fmtFecha(iso.slice(0,10));
  };
  return (
    <div className="campana-wrap" ref={ref}>
      <button className="campana-btn" onClick={()=>setAbierto(a=>!a)} title="Notificaciones" aria-label="Notificaciones">
        🔔{noLeidas.length>0 && <span className="campana-badge">{noLeidas.length>9?'9+':noLeidas.length}</span>}
      </button>
      {abierto && (
        <div className="campana-panel">
          <div className="campana-head">
            <b>Notificaciones</b>
            {noLeidas.length>0 && <button className="btn btn-ghost btn-sm" onClick={marcarTodas}>Marcar leídas</button>}
          </div>
          <div className="campana-list">
            {mias.length===0 && <div className="campana-empty">No tenés notificaciones todavía.</div>}
            {mias.slice(0,40).map(n=>{
              const leida=(n.leidaPor||[]).includes(user.id);
              return (
                <button key={n.id} className={"campana-item "+(leida?'':'unread')} onClick={()=>abrirNotif(n)}>
                  <span className="ci-ic">{n.icono||'🔔'}</span>
                  <span className="ci-body">
                    <span className="ci-tit">{n.titulo}</span>
                    {n.detalle && <span className="ci-det">{n.detalle}</span>}
                    <span className="ci-time">{tiempo(n.fecha)}</span>
                  </span>
                  {!leida && <span className="ci-dot"></span>}
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [db,_setDb]=useState(SEED);
  const [cargando,setCargando]=useState(SUPA_ON);
  const setDb=(fn)=>{ _setDb(prev=>{ const next = typeof fn==='function'?fn(prev):fn; SEED_DB_REF.current=next; supaGuardar(next); return next; }); };
  // carga inicial desde Supabase (si está configurado)
  useEffect(()=>{
    if(!SUPA_ON){ return; }
    (async()=>{
      const remoto=await supaCargar();
      if(remoto){
        const fusion={...SEED, ...remoto}; // SEED garantiza que existan claves nuevas
        _setDb(fusion); SEED_DB_REF.current=fusion;
      } else {
        // primera vez: sembrar la base inicial en Supabase
        supaGuardar(SEED);
      }
      setCargando(false);
    })();
  },[]);
  const [user,setUser]=useState(null);
  const [view,setView]=useState('inicio');
  const [menu,setMenu]=useState(false);
  const [toastMsg,setToastMsg]=useState(null);
  const [installEvt,setInstallEvt]=useState(null);
  const [about,setAbout]=useState(false);
  const [tema,setTema]=useState('dark');
  useEffect(()=>{ document.documentElement.setAttribute('data-theme', tema); },[tema]);
  const toggleTema=()=>setTema(t=>t==='light'?'dark':'light');
  useEffect(()=>{
    const h=(e)=>{e.preventDefault();setInstallEvt(e);};
    window.addEventListener('beforeinstallprompt',h);
    return ()=>window.removeEventListener('beforeinstallprompt',h);
  },[]);
  const toast=(m)=>{ setToastMsg(m); setTimeout(()=>setToastMsg(null),2600); };
  const instalar=()=>{ if(installEvt){ installEvt.prompt(); setInstallEvt(null);} };
  const go=(v)=>{ setView(v); setMenu(false); };

  if(cargando) return <div className="boot-screen"><div className="boot-logo"><LogoNexo size={64}/></div><div className="boot-txt">Sincronizando NEXFOR…</div></div>;
  if(!user) return <><Login onLogin={(u)=>{setUser(u);setView('inicio');}} installEvt={installEvt} onInstall={instalar} tema={tema} toggleTema={toggleTema}/>{toastMsg&&<div className="toast">{toastMsg}</div>}</>;

  const nav = NAV.filter(n=>n.roles.includes(user.rol));
  const secciones = ORDEN_SEC.filter(s=>nav.some(n=>n.sec===s));
  const props={db,setDb,user,toast,go,abrirAcerca:()=>setAbout(true)};

  return (
    <div className="shell">
      {menu && <div className="sb-overlay" onClick={()=>setMenu(false)}></div>}
      <aside className={"sidebar "+(menu?'open':'')}>
        <div className="sb-brand" onClick={()=>setAbout(true)} style={{cursor:'pointer'}} title="Acerca de NEXFOR">
          <LogoNexo size={48}/>
          <div style={{flex:1,textAlign:'center'}}><div className="nm">NEX<span className="fx">FOR</span></div></div>
          <EscudoDCF size={48}/>
        </div>
        <nav className="sb-nav">
          {secciones.map(sec=>(
            <div key={sec}>
              <div className="sb-section">{sec}</div>
              {nav.filter(n=>n.sec===sec).map(n=>(
                <button key={n.id} className={"nav-item "+(view===n.id?'active':'')} onClick={()=>go(n.id)}>
                  <span className="ic">{n.ic}</span>{n.label}
                </button>
              ))}
            </div>
          ))}
          <div className="sb-section">Sesión</div>
          <button className="nav-item" onClick={()=>{setUser(null);setMenu(false);}}><span className="ic">⎋</span>Cerrar sesión</button>
        </nav>
        <div className="sb-foot">Desarrollado por la<br/>Secretaría Académica<br/><b>MLF&EV</b> · DCFyCCCO</div>
      </aside>
      <div className="main">
        <header className="topbar">
          <button className="hamb" onClick={()=>setMenu(true)} aria-label="Abrir menú">☰</button>
          <h2>{TITULOS[view]}</h2>
          {installEvt && <button className="btn btn-amber btn-sm" onClick={instalar}>📲 Instalar app</button>}
          <Campana db={db} setDb={setDb} user={user} go={go}/>
          <button className="theme-btn" onClick={toggleTema} title="Cambiar tema" aria-label="Cambiar tema claro/oscuro">{tema==='light'?'🌙':'☀️'}</button>
          <div className="userchip">
            <div className={"avatar av-"+user.rol}>{(user.nombre[0]||'')+(user.apellido[0]||'')}</div>
            <div className="meta"><div className="un">{user.nombre} {user.apellido}</div><div className="ur">{ROLES[user.rol]}</div></div>
          </div>
        </header>
        <main className="content">
          {view==='inicio'      && <Dashboard {...props}/>}
          {view==='nexia'       && <Nexia {...props}/>}
          {view==='aula'        && <AulaVirtual {...props}/>}
          {view==='simulacion'  && <Simulacion {...props}/>}
          {view==='legajo'      && <Legajo {...props}/>}
          {view==='mesa'        && <MesaEntradas {...props}/>}
          {view==='libro'       && <LibroTemas {...props}/>}
          {view==='asistencia'  && <Asistencia {...props}/>}
          {view==='notas'       && <Calificaciones {...props}/>}
          {view==='material'    && <Material {...props}/>}
          {view==='comunicados' && <Comunicados {...props}/>}
          {view==='calendario'  && <Calendario {...props}/>}
          {view==='materias'    && <Materias {...props}/>}
          {view==='inteligencia'&& <Inteligencia {...props}/>}
          {view==='informes'    && <Informes {...props}/>}
          {view==='novedades'   && <Novedades {...props}/>}
          {view==='usuarios'    && <Usuarios {...props}/>}
          {view==='perfil'      && <Perfil {...props}/>}
        </main>
        <footer style={{textAlign:'center',padding:'14px',fontSize:11.5,color:'var(--muted)',borderTop:'1px solid var(--line)'}}>
          NEXFOR · Plataforma Integral de Formación y Desarrollo Policial · Desarrollado por la Secretaría Académica <b style={{color:'var(--amber)'}}>MLF&EV</b>
        </footer>
      </div>
      {about&&<AboutModal onClose={()=>setAbout(false)}/>}
      {toastMsg&&<div className="toast">{toastMsg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
